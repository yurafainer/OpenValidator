swagger: '2.0'
info:
  title: openFinance API Framework Implementation Guidelines Mandate Services
  x-ibm-name: openfinance-api-framework-implementation-guidelines-mandate-services
  version: 1.0.0
  description: >
    The processing of direct debit transactions comes with a related mandate of
    the debtor towards the creditor, creditor bank and debtor bank to process
    such mandates. 

    Such a mandate might come with a creditor mandate flow or a debtor mandate
    flow, depending on the underlying direct debit scheme. 

    The mandate can be signed by the debtor manually or the debtor agrees via
    electronic means, again depending on the related direct debit scheme rules. 
  contact:
    email: info@berlin-group.org
    name: The Berlin Group - A European Standards Initiative
    url: 'https://www.berlin-group.org/'
schemes:
  - https
basePath: /psd2
produces:
  - application/json
consumes:
  - application/json
security: []
securityDefinitions: {}
x-ibm-configuration:
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  cors:
    enabled: true
  assembly:
    execute:
      - switch:
          version: 2.0.0
          title: switch
          case:
            - condition: ($operationID() = 'createMandate')
              execute:
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: body-param
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: >-
                      $(app-server)/ServicesWS_v1.8.0/PaymentWS.svc/EstablishMandate
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
            - condition: ($operationID() = 'getMandate')
              execute:
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: >-
                      $(app-server)/ServicesWS_v1.8.0/PaymentWS.svc/GetMandate/$(request.parameters.resourceId)
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
            - condition: ($operationID() = 'deleteMandate')
              execute:
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: >-
                      $(app-server)/ServicesWS_v1.8.0/PaymentWS.svc/CancelMandate/$(request.parameters.resourceId)
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
            - condition: ($operationID() = 'getMandateStatus')
              execute:
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: >-
                      $(app-server)/ServicesWS_v1.8.0/PaymentWS.svc/GetMandateStatus/$(request.parameters.resourceId)
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
  properties:
    target-url:
      value: 'http://example.com/operation-name'
      description: The URL of the target service
      encoded: false
    app-server:
      value: 'https://skydev4-hz.matrix.it:8443'
  application-authentication:
    certificate: false
  activity-log:
    enabled: true
    error-content: header
    success-content: activity
  catalogs: {}
tags:
  - name: Mandates API
    description: >
      The implementation of such an API would of course require the related
      banks to clarify the compliance with the related direct debit scheme
      rules. The related direct debit scheme could e.g. 
        * define requirements on the API clients who are permitted to consume the APIs,
        * could mandate a digital signature of the authorisation proof by the debtor bank or
        * could restrict the usage of such a service to specific mandate classes. 
definitions:
  ServiceLevelCode:
    title: ServiceLevelCode
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Other ISO-related basic Types\" for more details.
    example: SEPA
    type: string
    enum:
      - BKTR
      - G001
      - G002
      - G003
      - G004
      - NPCA
      - NUGP
      - NURG
      - PRPT
      - SDVA
      - SEPA
      - SVDE
      - URGP
      - URNS
      - INST
      - SRTP
      - SVAT
      - G006
      - G007
      - G005
      - G009
      - WFSM
      - EOLO
  error_NG_409_Mandates:
    title: error_NG_409_Mandates
    type: object
    properties:
      apiClientMessages:
        type: array
        items:
          $ref: '#/definitions/clientMessageInformation_409_Mandates'
      _links:
        $ref: '#/definitions/links'
  _links_201_Mandates:
    title: _links_201_Mandates
    type: object
    properties:
      scaOAuth:
        $ref: '#/definitions/hrefType'
      confirmation:
        $ref: '#/definitions/hrefType'
      self:
        $ref: '#/definitions/hrefType'
      status:
        $ref: '#/definitions/hrefType'
      scaStatus:
        $ref: '#/definitions/hrefType'
  error_NG_403_Mandates:
    title: error_NG_403_Mandates
    type: object
    properties:
      apiClientMessages:
        type: array
        items:
          $ref: '#/definitions/clientMessageInformation_403_Mandates'
      _links:
        $ref: '#/definitions/links'
  PreferredMethod:
    title: PreferredMethod
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Preferred Method\" for more details.
    example: MAIL
    type: string
    enum:
      - LETT
      - MAIL
      - PHON
      - FAXX
      - CELL
  OrganisationIdentificationCode:
    title: OrganisationIdentificationCode
    example: BOID
    type: string
    enum:
      - BANK
      - CBID
      - CHID
      - CINC
      - COID
      - CUST
      - DUNS
      - EMPL
      - GS1G
      - SREN
      - SRET
      - TXID
      - BDID
      - BOID
  clientMessageInformation_400_Mandates:
    title: clientMessageInformation_400_Mandates
    type: object
    properties:
      category:
        description: Only \"ERROR\" or \"WARNING\" permitted
        type: string
      code:
        $ref: '#/definitions/MessageCode_ServiceUnspecific_400'
      path:
        type: string
      text:
        example: 'Text, maximum of 500 characters.'
        type: string
        maxLength: 500
    required:
      - category
      - code
  clientMessageInformation_403_Mandates:
    title: clientMessageInformation_403_Mandates
    type: object
    properties:
      category:
        description: Only \"ERROR\" or \"WARNING\" permitted
        type: string
      code:
        $ref: '#/definitions/MessageCode_ServiceUnspecific_403'
      path:
        type: string
      text:
        example: 'Text, maximum of 500 characters.'
        type: string
        maxLength: 500
    required:
      - category
      - code
  ocurrences:
    title: ocurrences
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Ocurrences\" for more details.
    type: object
    properties:
      sequenceType:
        $ref: '#/definitions/SequenceTypeCode'
      frequencyType:
        $ref: '#/definitions/FrequencyCode'
      duration:
        $ref: '#/definitions/duration'
      firstCollectionDate:
        description: Date of the first collection of a direct debit as per the mandate.
        type: string
        format: date
      finalCollectionDate:
        description: Date of the final collection of a direct debit as per the mandate.
        type: string
        format: date
    required:
      - sequenceType
  mandatesCancelResponse-202:
    title: mandatesCancelResponse-202
    description: Body of the response for a successful cancel mandate request.
    type: object
    properties:
      mandateStatus:
        $ref: '#/definitions/MandateStatus'
      _links:
        $ref: '#/definitions/_linksMandateCancellation'
    required:
      - mandateStatus
  error_NG_400_Mandates:
    title: error_NG_400_Mandates
    type: object
    properties:
      apiClientMessages:
        type: array
        items:
          $ref: '#/definitions/clientMessageInformation_400_Mandates'
      _links:
        $ref: '#/definitions/links'
  FrequencyCode:
    title: FrequencyCode
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Frequency Code\" for more details.
    example: Monthly
    type: string
    enum:
      - Daily
      - Weekly
      - EveryTwoWeeks
      - Monthly
      - EveryTwoMonths
      - Quarterly
      - SemiAnnual
      - Annual
      - MonthlyVariable
  mandateType:
    title: mandateType
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Mandate Type\" for more details.
    type: object
    properties:
      localInstrumentCode:
        $ref: '#/definitions/ExternalLocalInstrumentCode'
      localInstrumentProprietary:
        type: string
        maxLength: 35
      serviceLevelCode:
        $ref: '#/definitions/ServiceLevelCode'
      serviceLevelProprietary:
        type: string
        maxLength: 35
      categoryPurposeCode:
        $ref: '#/definitions/CategoryPurposeCode'
      categoryPurposeProprietary:
        type: string
        maxLength: 35
      classificationCode:
        $ref: '#/definitions/ClassificationCode'
      classificationProprietary:
        type: string
        maxLength: 35
  referredMandateDocumentInformation:
    title: referredMandateDocumentInformation
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Referred Mandate Document Information\" for more details.
    type: object
    properties:
      typeCode:
        $ref: '#/definitions/ReferredDocumentTypeCode'
      typeProprietary:
        description: >-
          Specifies the type of referred document, provided in proprietary
          encoding.
        type: string
        maxLength: 35
      typeIssuer:
        description: Issuer of the document type.
        type: string
        maxLength: 35
      number:
        description: Unique and unambiguous identification of the referred document.
        type: string
        maxLength: 35
      creditorReference:
        description: >-
          Unique and unambiguous identification as assigned by the creditor to
          the referred document shared with the debtor for its own reference.
        type: string
        maxLength: 35
      relatedDate:
        description: Date associated with the referred document.
        type: string
        format: date
  ClassificationCode:
    title: ClassificationCode
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Mandate Classification Code\" for more details.
    example: FIXE
    type: string
    enum:
      - FIXE
      - USGB
      - VARI
  hrefType:
    title: hrefType
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section \"href
      Type\" for more details.
    type: object
    properties:
      href:
        type: string
    required:
      - href
  _linksMandateCancellation:
    title: _linksMandateCancellation
    description: >-
      A list of hyperlinks to be recognised by the TPP. The actual hyperlinks
      used in the response depend on the

      dynamical decisions of the ASPSP when processing the request.


      Remark: All links can be relative or full links, to be decided by the
      ASPSP.


      Type of links admitted in this response, (further links might be added for
      ASPSP defined extensions):
        BOI Remarks: Added by BOI
        * 'scaOAuth':
          In case of a SCA OAuth2 Approach, the ASPSP is transmitting the URI where the
          configuration of the Authorisation Server can be retrieved.
          The configuration follows the OAuth 2.0 Authorisation Server Metadata specification.
    type: object
    properties:
      scaOAuth:
        $ref: '#/definitions/hrefType'
  links:
    title: links
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Links\" for more details.
    type: object
    properties:
      scaOAuth:
        $ref: '#/definitions/hrefType'
      confirmation:
        $ref: '#/definitions/hrefType'
      self:
        $ref: '#/definitions/hrefType'
      status:
        $ref: '#/definitions/hrefType'
      transactionfees:
        $ref: '#/definitions/hrefType'
      scaStatus:
        $ref: '#/definitions/hrefType'
      account:
        $ref: '#/definitions/hrefType'
      savingsAccount:
        $ref: '#/definitions/hrefType'
      loanAccount:
        $ref: '#/definitions/hrefType'
      balances:
        $ref: '#/definitions/hrefType'
      transactions:
        $ref: '#/definitions/hrefType'
      cardAccount:
        $ref: '#/definitions/hrefType'
      cardTransactions:
        $ref: '#/definitions/hrefType'
      transactionDetails:
        $ref: '#/definitions/hrefType'
      ibanCheck:
        $ref: '#/definitions/hrefType'
      paymentInitiation:
        $ref: '#/definitions/hrefType'
      securitiesAccount:
        $ref: '#/definitions/hrefType'
      positions:
        $ref: '#/definitions/hrefType'
      orders:
        $ref: '#/definitions/hrefType'
      orderDetails:
        $ref: '#/definitions/hrefType'
      relatedOrders:
        description: >-
          An array of links to request order details of related orders related
          to the order that is represented by the data structure containing this
          element 

          (e.g. other orders that originated from the same order split as this
          order).
        type: array
        items:
          $ref: '#/definitions/hrefType'
      relatedTransactions:
        description: >-
          An array of links to request securities transaction details of
          transactions that resulted from this order.
        type: array
        items:
          $ref: '#/definitions/hrefType'
      subscription:
        $ref: '#/definitions/hrefType'
      entryStatusRevoked:
        description: Links to entry endpoints where the entry status is revoked.
        type: array
        items:
          $ref: '#/definitions/hrefType'
      first:
        $ref: '#/definitions/hrefType'
      next:
        $ref: '#/definitions/hrefType'
      previous:
        $ref: '#/definitions/hrefType'
      last:
        $ref: '#/definitions/hrefType'
      download:
        $ref: '#/definitions/hrefType'
      confirmInitiation:
        $ref: '#/definitions/hrefType'
      aspspParameters:
        $ref: '#/definitions/hrefType'
      aspspContacts:
        $ref: '#/definitions/hrefType'
      aspspDowntimes:
        $ref: '#/definitions/hrefType'
  genericFinancialInstitutionIdentification:
    title: genericFinancialInstitutionIdentification
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Generic Financial Institution Identification\" for more details.
    type: object
    properties:
      identification:
        description: Unique and unambiguous identification of a financial insitution.
        type: string
        maxLength: 35
      schemeNameCode:
        description: An entry provided by an external ISO code list
        type: string
      schemeNameProprietary:
        description: A scheme name defined in a proprietary way.
        type: string
        maxLength: 35
      issuer:
        description: Issuer of the identification
        type: string
        maxLength: 35
    required:
      - identification
  financialInstitutionIdentification:
    title: financialInstitutionIdentification
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Financial Institution Identification\" for more details.
    type: object
    properties:
      bicfi:
        type: string
        pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
      clearingSystemMemberId:
        $ref: '#/definitions/clearingSystemMemberIdentification'
      name:
        description: Name of the financial institution
        type: string
        maxLength: 140
      postalAddress:
        $ref: '#/definitions/postalAddress'
      other:
        $ref: '#/definitions/genericFinancialInstitutionIdentification'
  AuthenticationType:
    title: AuthenticationType
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Authentication Type\" for more details.
    example: PUSH_OTP
    type: string
    enum:
      - SMS_OTP
      - CHIP_OTP
      - PHOTO_OTP
      - PUSH_OTP
      - SMTP_OTP
  SequenceTypeCode:
    title: SequenceTypeCode
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Other ISO-related basic Types\" for more details.
    example: OOFF
    type: string
    enum:
      - RCUR
      - OOFF
  accountReference:
    title: accountReference
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Account Reference\" for more details.
    type: object
    properties:
      iban:
        type: string
        pattern: '[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}'
      bban:
        description: >-
          BBAN of the account. This data elements is used for payment accounts
          which have no IBAN.
        type: string
      maskedPan:
        description: Primary Account Number (PAN) of a card in a masked form.
        type: string
        maxLength: 35
      msisdn:
        description: >-
          An alias to access a payment account via a registered mobile phone
          number.
        type: string
        pattern: '^[0-9]{3}-\+?[1-9]\d{1,14}(\s?\d{1,13})*$'
      other:
        $ref: '#/definitions/genericAccountIdentification'
      typeCode:
        $ref: '#/definitions/CashAccountType'
      typeProprietary:
        description: >-
          Remark: Shall not be used in the consent model, since account category
          provides enough information for the ASPSP.
        type: string
        maxLength: 35
      currency:
        description: ISO 4217 Alpha 3 currency code
        type: string
        pattern: '[A-Z]{3}'
  ClearingSystemIdentificationCode:
    title: ClearingSystemIdentificationCode
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Other ISO-related basic Types\" for more detail
    example: DEBLZ
    type: string
    enum:
      - ATBLZ
      - AUBSB
      - CACPA
      - CHBCC
      - CHSIC
      - CNAPS
      - DEBLZ
      - ESNCC
      - GBDSC
      - GRBIC
      - HKNCC
      - IENCC
      - INFSC
      - ITNCC
      - JPZGN
      - NZNCC
      - PLKNR
      - PTNCC
      - RUCBC
      - SESBA
      - SGIBG
      - THCBC
      - TWNCC
      - USABA
      - USPID
      - ZANCC
      - NZRSA
      - MZBMO
      - CNCIP
      - KRBOK
  error_RFC7807_405_Mandates:
    title: error_RFC7807_405_Mandates
    description: >-
      Standardised definition of reporting error information according to
      [RFC7807].
    type: object
    properties:
      type:
        description: >-
          A URI reference [RFC3986] that identifies the problem type. 

          Remark For Future: These URI will be provided by NextGenPSD2 in
          future.
        type: string
        maxLength: 70
      title:
        description: >-
          Short human readable description of error type. Could be in local
          language. To be provided by ASPSPs.
        type: string
        maxLength: 70
      status:
        description: >-
          HTTP response code generated by the server.

          If contained, this is more relevant as the actual http response code
          in the actual response, because it is introduced by the application
          server.
        type: integer
        format: int32
      detail:
        description: Detailed human readable text specific to this instance of the error.
        type: string
        maxLength: 500
      instance:
        description: >-
          This attribute is containing a JSON pointer (as defined in [RFC6901])
          or XPath expression to indicate the path to an issue generating the
          error in the related request.
        type: string
        maxLength: 256
      code:
        description: >-
          See document \"openFinance API Framework Data Dictionary\", section
          \"Service Unspecific HTTP Error Codes\" for more details.
        example: SERVICE_INVALID
        type: string
        default: SERVICE_INVALID
      additionalErrors:
        description: |-
          Array of Error Information Blocks.
          Might be used if more than one error is to be communicated
        type: array
        items:
          $ref: '#/definitions/AdditionalError'
      _links:
        $ref: '#/definitions/links'
    required:
      - type
      - code
  error_NG_404_Mandates:
    title: error_NG_404_Mandates
    type: object
    properties:
      apiClientMessages:
        type: array
        items:
          $ref: '#/definitions/clientMessageInformation_404_Mandates'
      _links:
        $ref: '#/definitions/links'
  clientMessageInformation_404_Mandates:
    title: clientMessageInformation_404_Mandates
    type: object
    properties:
      category:
        description: Only \"ERROR\" or \"WARNING\" permitted
        type: string
      code:
        description: >-
          See document \"openFinance API Framework Data Dictionary\", section
          \"Service Unspecific HTTP Error Codes\" for more details.
        example: RESOURCE_UNKNOWN
        type: string
        default: RESOURCE_UNKNOWN
      path:
        type: string
      text:
        example: 'Text, maximum of 500 characters.'
        type: string
        maxLength: 500
    required:
      - category
      - code
  CashAccountType:
    title: CashAccountType
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Other ISO-related basic Types\" for more details.
    example: CACC
    type: string
    enum:
      - CACC
  genericAccountIdentification:
    title: genericAccountIdentification
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Generic Account Identification\" for more details.
    type: object
    properties:
      identification:
        description: Unique and unambiguous identification of an account.
        type: string
        maxLength: 35
      schemeNameCode:
        $ref: '#/definitions/AccountIdentificationCode'
      schemeNameProprietary:
        description: A scheme name defined in a proprietary way.
        type: string
        maxLength: 35
      issuer:
        description: Issuer of the identification
        type: string
        maxLength: 35
    required:
      - identification
  postalAddress:
    title: postalAddress
    description: >-
      See document \"openFinance API Framework Data Dictionary\", section
      \"Postal Address\" for more details.
    type: object
    properties:
      addressLines:
        description: >-
          At most seven entries are permitted. May only be used, if none of the
          structured address elements \"streetName\", \"buildingNumber\",
          \"postcode\" or \"townName\" is used.

          *Remark:* For SEPA transactions this is further restricted to a
          maximum of 1 entry.
        type: array
        items:
          type: string
          maxLength: 140
        maxLength: 140
        maxItems: 7
      department:
        description: Identification of a division of a large organisation or building.
        type: string
        maxLength: 70
      subDepartment:
        description: Identification of a sub-division of a large organisation or building.
        type: string
        maxLength: 70
      streetName:
        description: Name of a street or thoroughfare.
        type: string
        maxLength: 70
      buildingNumber:
        description: Number that identifies the position of a building on a street.
        type: string
        maxLength: 16
      buildingName:
        description: Name of the building or house.
        type: string
        maxLength: 35
      floor:
        description: Floor or storey within a building.
        type: string
        maxLength: 70
      postBox:
        description: >-
          Numbered box in a post office, assigned to a person or organisation,
          where letters are kept until called for.
        type: string
        maxLength: 16
      room:
        description: Building room number.
        type: string
        maxLength: 70
      postCode:
        description: >-
          Identifier consisting of a group of letters and/or numbers that is
          added to a postal address to assist the sorting of mail.
        type: string
        maxLength: 16
      townName:
        description: >-
          Name of a built-up area, with defined boundaries, and a local
          government. 

