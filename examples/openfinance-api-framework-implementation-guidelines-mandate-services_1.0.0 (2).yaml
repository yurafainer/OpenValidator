    delete:
      description: |
        Deletes a given mandate
      summary: deleteMandate
      tags:
        - Mandates API
      operationId: deleteMandate
      deprecated: false
      produces:
        - application/json
        - application/problem+json
      parameters:
        - name: resourceId
          in: path
          required: true
          type: string
          maxLength: 70
          description: >-
            Resource identification of the related payment initiation, signing
            basket, consent, subscription or other related business transaction
            resource.
        - name: X-Request-ID
          in: header
          required: true
          type: string
          format: uuid
          description: >-
            ID of the request, unique to the call, as determined by the
            initiating party.
        - name: Digest
          in: header
          required: true
          type: string
          description: >-
            Is contained if and only if the "Signature" element is contained in
            the header of the request.
        - name: Signature
          in: header
          required: true
          type: string
          description: >-
            A signature of the request by the TPP on application level. This
            might be mandated by ASPSP.
        - name: TPP-Signature-Certificate
          in: header
          required: true
          type: string
          description: |-
            The certificate used for signing the request, in base64 encoding.
            Must be contained if a signature is contained.
        - name: TPP-Redirect-Preferred
          in: header
          required: false
          type: boolean
          description: >-
            BOI-REMARK- If it equals "false" , the ASPSP has to choose Decoupled
            SCA approach if supported by the ASPSP for the related PSU, because
            Embedded does not supported.
             ASPSP not supporting Decoupled SCA approach can ignore this attribute.
        - name: TPP-Decoupled-Preferred
          in: header
          required: false
          type: boolean
          description: >-
            If it equals "true", the TPP prefers a decoupled SCA approach.

            If it equals "false", the TPP prefers not to use the decoupled
            approach for SCA. The ASPSP will then choose between the embedded or
            the redirect SCA approach, depending on the choice of the SCA
            procedure by the TPP/PSU.

            If the parameter is not used, the ASPSP will choose the SCA approach
            to be applied depending on the parameter TPP-Redirect-Preferred and
            the SCA method chosen by the TPP/PSU.

            The parameter might be ignored by the ASPSP.

            If both parameters TPP-Redirect-Preferred and
            TPP-Decoupled-Preferred are present and true, the request is still
            not rejected, but it is up to the ASPSP, which approach will
            actually be used.


            **Remark for Future:**

            TPP-Redirect-Preferred and TPP-Decoupled-Preferred will be revised
            in future versions, maybe merged. Currently kept separate for
            downward compatibility.
        - name: TPP-Nok-Redirect-URI
          in: header
          required: false
          type: string
          maxLength: 2048
          description: >-
            If this URI is contained, the TPP is asking to redirect the
            transaction flow to this address instead of the TPP-Redirect-URI in
            case

            of a negative result of the redirect SCA method. This might be
            ignored by the ASPSP.
        - name: TPP-Redirect-URI
          in: header
          required: false
          type: string
          maxLength: 2048
          description: >-
            URI of the TPP, where the transaction flow shall be redirected to
            after a Redirect.


            Mandated for the Redirect SCA Approach, specifically

            when TPP-Redirect-Preferred equals "true".

            It is recommended to always use this header field.


            **Remark for Future:**

            This field might be changed to mandatory in the next version of the
            specification.
        - name: TPP-Explicit-Authorisation-Preferred
          in: header
          required: false
          type: boolean
          description: >-
            If it equals "true", the TPP prefers to start the authorisation
            process separately,

            e.g. because of the usage of a signing basket.

            This preference might be ignored by the ASPSP, if a signing basket
            is not supported as functionality.


            If it equals "false" or if the parameter is not used, there is no
            preference of the TPP.

            This especially indicates that the TPP assumes a direct
            authorisation of the transaction in the next step,

            without using a signing basket.
        - name: PSU-IP-Address
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Address header field consists of the corresponding
            http request IP Address field between PSU and TPP.
        - name: PSU-IP-Port
