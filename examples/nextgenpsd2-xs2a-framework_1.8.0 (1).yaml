  transactionStatus:
    title: transactionStatus
    description: |-
      The transaction status is filled with codes of the ISO 20022 data table:
      - 'ACCC': 'AcceptedSettlementCompleted' -
        Settlement on the creditor's account has been completed.
      - 'ACCP': 'AcceptedCustomerProfile' -
        Preceding check of technical validation was successful.
        Customer profile check was also successful.
      - 'ACSC': 'AcceptedSettlementCompleted' -
        Settlement on the debtor�s account has been completed.

        **Usage:** this can be used by the first agent to report to the debtor that the transaction has been completed.

        **Warning:** this status is provided for transaction status reasons, not for financial information.
        It can only be used after bilateral agreement.
      - 'ACSP': 'AcceptedSettlementInProcess' -
        All preceding checks such as technical validation and customer profile were successful and therefore the payment initiation has been accepted for execution.
      - 'ACTC': 'AcceptedTechnicalValidation' -
        Authentication and syntactical and semantical validation are successful.
      - 'ACWC': 'AcceptedWithChange' -
        Instruction is accepted but a change will be made, such as date or remittance not sent.
      - 'ACWP': 'AcceptedWithoutPosting' -
        Payment instruction included in the credit transfer is accepted without being posted to the creditor customer�s account.
      - 'RCVD': 'Received' -
        Payment initiation has been received by the receiving agent.
      - 'PDNG': 'Pending' -
        Payment initiation or individual transaction included in the payment initiation is pending.
        Further checks and status update will be performed.
      - 'RJCT': 'Rejected' -
        Payment initiation or individual transaction included in the payment initiation has been rejected.
      - 'CANC': 'Cancelled'
        Payment initiation has been cancelled before execution
        Remark: This codeis accepted as new code by ISO20022.
      - 'ACFC': 'AcceptedFundsChecked' -
        Preceding check of technical validation and customer profile was successful and an automatic funds check was positive .
        Remark: This code is accepted as new code by ISO20022.
      - 'PATC': 'PartiallyAcceptedTechnical'
        Correct The payment initiation needs multiple authentications, where some but not yet all have been performed. Syntactical and semantical validations are successful.
        Remark: This code is accepted as new code by ISO20022.
      - 'PART': 'PartiallyAccepted' -
        A number of transactions have been accepted, whereas another number of transactions have not yet achieved 'accepted' status.
        Remark: This code may be used only in case of bulk payments. It is only used in a situation where all mandated authorisations have been applied, but some payments have been rejected.
    example: ACCC
    type: string
    enum:
      - ACCC
      - ACSC
      - ACSP
      - ACTC
      - ACWC
      - RCVD
      - RJCT
      - CANC
      - ACFC
      - PATC
      - PART
  scaStatus:
    title: scaStatus
    description: >-
      This data element is containing information about the status of the SCA
      method applied.


      The following codes are defined for this data type.

        * 'received':
          An authorisation or cancellation-authorisation resource has been created successfully.
        * 'psuIdentified':
          The PSU related to the authorisation or cancellation-authorisation resource has been identified.
        * 'psuAuthenticated':
          The PSU related to the authorisation or cancellation-authorisation resource has been identified and authenticated e.g. by a password or by an access token.
        * 'unconfirmed':
          SCA is technically successfully finalised by the PSU, but the authorisation resource needs a confirmation command by the TPP yet.
        * 'started':
          The addressed SCA routine has been started.
        * 'finalised':
          The SCA routine has been finalised successfully (including a potential confirmation command).
          This is a final status of the authorisation resource.
        * 'failed':
          The SCA routine failed.
          This is a final status of the authorisation resource.
        * 'exempted':
          SCA was exempted for the related transaction, the related authorisation is successful.
          This is a final status of the authorisation resource.
    example: psuAuthenticated
    type: string
    enum:
      - received
      - psuIdentified
      - psuAuthenticated
      - started
      - unconfirmed
      - finalised
      - failed
      - exempted
  scaStatusAuthorisationConfirmation:
    title: scaStatusAuthorisationConfirmation
    description: >-
      This data element is containing information about the status of the SCA
      method in an authorisation confirmation response.


      The following codes are defined for this data type.

        * 'finalised': if the transaction authorisation and confirmation was successfule.
        * 'failed': if the transaction authorisation or confirmation was not successful.
    type: string
    enum:
      - finalised
      - failed
  consentStatus:
    title: consentStatus
    description: >-
      This is the overall lifecycle status of the consent.

      BOI-REMARK: Any further codes should be cordinated in advance with BOI.


      Valid values are:
        - 'received': The consent data have been received and are technically correct.
          The data is not authorised yet.
        - 'rejected': The consent data have been rejected e.g. since no successful authorisation has taken place.
        - 'valid': The consent is accepted and valid for GET account data calls and others as specified in the consent object.
        - 'revokedByPsu': The consent has been revoked by the PSU towards the ASPSP.
        - 'expired': The consent expired.
        - 'terminatedByTpp': The corresponding TPP has terminated the consent by applying the DELETE method to the consent resource.
        - 'partiallyAuthorised': The consent is due to a multi-level authorisation, some but not all mandated authorisations have been performed yet.
        - 'suspendedByASPSP' : The consent has been suspended by the ASPSP, according to requirements that are detailed in BOI's directive.

      The ASPSP might add further codes. These codes then shall be contained in
      the ASPSP's documentation of the XS2A interface

      and has to be added to this API definition as well.
    type: string
    enum:
      - received
      - rejected
      - valid
      - revokedByPsu
      - expired
      - terminatedByTpp
      - partiallyAuthorised
      - suspendedByASPSP
  hrefType:
    title: hrefType
    description: Link to a resource.
    type: object
    properties:
      href:
        description: Link to a resource.
        example: /v1/payments/sepa-credit-transfers/1234-wertiq-983
        type: string
  authorisations:
    title: authorisations
    description: An array of all authorisationIds.
    type: object
    properties:
      authorisationIds:
        description: An array of all authorisationIds.
        type: array
        items:
          type: string
    required:
      - authorisationIds
  consentAccountReference:
    title: consentAccountReference
    description: |-
      Reference to an account by either
        * IBAN, of a payment accounts, or
        * PAN of a card in a masked form, or
        * an alias to access a payment account via a registered mobile phone number (MSISDN).

        BOI-REMARK: The currency of the account is needed, where the currency is an account charactaristic identifying certain sub-accounts under one external identifier like an IBAN. Once the currency wasn't defined, a specific IBAN includes all the currencies relates to this IBAN.
    type: object
    properties:
      iban:
        description: IBAN of an account.
        example: FR7612345987650123456789014
        type: string
        pattern: '^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}$'
      bban:
        description: |-
          Basic Bank Account Number (BBAN) Identifier.

          This data element can be used in the body of the consent request.
            Message for retrieving account access consent from this account. This
            data elements is used for payment accounts which have no IBAN.
            ISO20022: Basic Bank Account Number (BBAN).

            Identifier used nationally by financial institutions, i.e., in individual countries,
            generally as part of a National Account Numbering Scheme(s),
            which uniquely identifies the account of a customer.
        type: string
      maskedPan:
        description: Masked Primary Account Number.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      msisdn:
        description: Mobile phone number.
        example: +49 170 1234567
        type: string
        maxLength: 35
      currency:
        $ref: '#/definitions/consentCurrencyCode'
      other:
        $ref: '#/definitions/otherType'
      cashAccountType:
        $ref: '#/definitions/cashAccountType'
  accountReference:
    title: accountReference
    description: |-
      Reference to an account by either
        * IBAN, of a payment accounts, or
        * BBAN, for payment accounts if there is no IBAN, or
        * the Primary Account Number (PAN) of a card in a masked form, or
        * an alias to access a payment account via a registered mobile phone number (MSISDN), or
        * a proprietary ID of the  respective account that uniquely identifies the account for this ASPSP.
    type: object
    properties:
      iban:
        description: IBAN of an account.
        example: FR7612345987650123456789014
        type: string
        pattern: '^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}$'
      bban:
        description: |-
          Basic Bank Account Number (BBAN) Identifier.

          This data element can be used in the body of the consent request.
            Message for retrieving account access consent from this account. This
            data elements is used for payment accounts which have no IBAN.
            ISO20022: Basic Bank Account Number (BBAN).

            Identifier used nationally by financial institutions, i.e., in individual countries,
            generally as part of a National Account Numbering Scheme(s),
            which uniquely identifies the account of a customer.
        type: string
      maskedPan:
        description: Masked Primary Account Number.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      msisdn:
        description: Mobile phone number.
        example: +49 170 1234567
        type: string
        maxLength: 35
      other:
        $ref: '#/definitions/otherType'
      currency:
        description: >-
          ISO 4217 Alpha 3 currency code. BOI REMARK - XXX for multicurrency
          account.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      cashAccountType:
        $ref: '#/definitions/cashAccountType'
  otherType:
    title: otherType
    description: >-
      In cases where the specifically defined criteria (IBAN, BBAN, MSISDN) are
      not provided to identify an instance of the respective account type (e.g.
      a savings account), the ASPSP shall include a proprietary ID of the
      respective account that uniquely identifies the account for this ASPSP.
    type: object
    properties:
      identification:
        description: Proprietary identification of the account.
        type: string
        maxLength: 35
      schemeNameCode:
        description: An entry provided by an external ISO code list.
        type: string
        maxLength: 35
      schemeNameProprietary:
        description: A scheme name defined in a proprietary way.
        type: string
        maxLength: 35
      issuer:
        description: Issuer of the identification.
        type: string
        maxLength: 35
    required:
      - identification
  balanceType:
    title: balanceType
    description: |-
      The following balance types are defined:
        - "closingBooked": #BOI-REMARK: THIS TYPE IS MANDATORY
          Balance of the account at the end of the pre-agreed account reporting period.
          It is the sum of the opening booked balance at the beginning of the period and all entries booked
          to the account during the pre-agreed account reporting period.

          For card-accounts, this is composed of

            - invoiced, but not yet paid entries

        - "expected": #BOI-REMARK: THIS TYPE IS CONDITIONAL
          Balance composed of booked entries and pending items known at the time of calculation,
          which projects the end of day balance if everything is booked on the account and no other entry is posted.

          For card accounts, this is composed of:
            - invoiced, but not yet paid entries
            - not yet invoiced but already booked entries and
            - pending items (not yet booked)

          For card-accounts:

          "money to spend with the value of a pre-approved credit limit on the card account"

        - "openingBooked": #BOI-REMARK: THIS TYPE IS OPTIONAL
          Book balance of the account at the beginning of the account reporting period.
          It always equals the closing book balance from the previous report.
        - "interimAvailable": #BOI-REMARK: THIS TYPE IS CONDITIONAL
          Available balance calculated in the course of the account ?servicer?s business day,
          at the time specified, and subject to further changes during the business day.
          The interim balance is calculated on the basis of booked credit and debit items during the calculation
          time/period specified.

          For card-accounts, this is composed of:
            - invoiced, but not yet paid entries
            - not yet invoiced but already booked entries
        - "interimBooked": #BOI-REMARK: THIS TYPE IS CONDITIONAL
          Balance calculated in the course of the account servicer's business day, at the time specified,
          and subject to further changes during the business day.
          The interim balance is calculated on the basis of booked credit and debit items during the calculation time/period
          specified.
        - "forwardAvailable": #BOI-REMARK: THIS TYPE IS CONDITIONAL
          Forward available balance of money that is at the disposal of the account owner on the date specified.
        - "nonInvoiced":  
          Only for card accounts, to be checked yet.
    type: string
    enum:
      - closingBooked
      - expected
      - openingBooked
      - interimAvailable
      - interimBooked
      - forwardAvailable
      - nonInvoiced
  accountAccess:
    title: accountAccess
    description: Requested access services for a consent.
    type: object
    properties:
      accounts:
        description: >-
          Is asking for detailed account information.


          If the array is empty in a request, the TPP is asking for an
          accessible account list.

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for balances,
          additionalInformation sub attributes or transactions shall be empty,
          if used.
        type: array
        items:
          $ref: '#/definitions/consentAccountReference'
      balances:
        description: >-
          Is asking for balances of the addressed accounts.


          If the array is empty in the request, the TPP is asking for the
          balances of all accessible account lists.

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for accounts,
          additionalInformation sub attributes or transactions shall be empty,
          if used.
        type: array
        items:
          $ref: '#/definitions/consentAccountReference'
      transactions:
        description: >-
          Is asking for transactions of the addressed accounts.


          If the array is empty in the request, the TPP is asking for the
          transactions of all accessible account lists.

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for accounts,
          additionalInformation sub attributes or balances shall be empty, if
          used.
        type: array
        items:
          $ref: '#/definitions/consentAccountReference'
      additionalInformation:
        $ref: '#/definitions/additionalInformationAccess'
      availableAccounts:
        $ref: '#/definitions/AvailableAccounts'
      availableAccountsWithBalance:
        $ref: '#/definitions/AvailableAccountsWithBalance'
      allPsd2:
        $ref: '#/definitions/AllPsd2'
      restrictedTo:
        description: >-
          If the TPP requests access to accounts via availableAccounts (List of
          available accounts), global

          or bank driven consents, the TPP may include this element to restrict
          access to the referred

          account types. Absence of the element is interpreted as "no
          restriction" (therefore access to

          accounts of all types is requested). The element may only occur, if
          each of the elements
            - accounts
            - balances
            - transactions
          is either not present or contains an empty array.

          BOI-REMARK:
            This attribute have to be supported by the API Provider.

            In detailed consent model this field have to be empty or not presented.
        type: array
        items:
          $ref: '#/definitions/cashAccountType'
  cashAccountType:
    title: cashAccountType
    description: ExternalCashAccountType1Code from ISO 20022.
    type: string
    enum:
      - CACC
      - CARD
      - LOAN
      - SVGS
      - SCTS
  accountStatus:
    title: accountStatus
    description: >-
      Account status. The value is one of the following:
        - "enabled": account is available
        - "deleted": account is terminated
        - "blocked": account is blocked e.g. for legal reasons
      If this field is not used, than the account is available in the sense of
      this specification.
    type: string
    enum:
      - enabled
      - deleted
      - blocked
  accountDetails:
    title: accountDetails
    description: >-
      The ASPSP shall give at least one of the account reference identifiers:
        - iban
        - bban
        - maskedPan
        - msisdn
        - other
      If the account is a multicurrency account currency code in "currency" is
      set to "XXX" or "ILY" depents on the consent.
    type: object
    properties:
      resourceId:
        description: >-
          This shall be filled, if addressable resource are created by the ASPSP
          on the /accounts or /card-accounts endpoint.
        type: string
      iban:
        description: IBAN of an account.
        example: FR7612345987650123456789014
        type: string
        pattern: '^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}$'
      bban:
        description: |-
          Basic Bank Account Number (BBAN) Identifier.

          This data element can be used in the body of the consent request.
            Message for retrieving account access consent from this account. This
            data elements is used for payment accounts which have no IBAN.
            ISO20022: Basic Bank Account Number (BBAN).

            Identifier used nationally by financial institutions, i.e., in individual countries,
            generally as part of a National Account Numbering Scheme(s),
            which uniquely identifies the account of a customer.
        type: string
      msisdn:
        description: Mobile phone number.
        example: +49 170 1234567
        type: string
        maxLength: 35
      currency:
        description: >-
          ISO 4217 Alpha 3 currency code. BOI REMARK - XXX for multicurrency
          account.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      name:
        description: >-
          Name of the account, as assigned by the ASPSP, in agreement with the
          account owner in order to provide an additional means of
          identification of the account.
        type: string
        maxLength: 70
      displayName:
        description: Name of the account as defined by the PSU within online channels.
        type: string
        maxLength: 70
      product:
        description: 'Product name of the bank for this account, proprietary definition.'
        type: string
        maxLength: 35
      cashAccountType:
        $ref: '#/definitions/cashAccountType'
      status:
        $ref: '#/definitions/accountStatus'
      bic:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      linkedAccounts:
        description: >-
          Case of a set of pending card transactions, the APSP will provide the
          relevant cash account the card is set up on.
        type: string
        maxLength: 70
      usage:
        $ref: '#/definitions/Usage'
      details:
        description: |-
          Specifications that might be provided by the ASPSP:
            - characteristics of the account
            - characteristics of the relevant card
        type: string
        maxLength: 500
      balances:
        description: >-
          A list of balances regarding this account, e.g. the current balance,
          the last booked balance.

          The list might be restricted to the current balance.
        type: array
        items:
          $ref: '#/definitions/balance'
      _links:
        $ref: '#/definitions/_linksAccountDetails'
      ownerName:
        description: >-
          Name of the legal account owner.

          If there is more than one owner, then e.g. two names might be noted
          here.


          For a corporate account, the corporate name is used for this
          attribute.

          Even if supported by the ASPSP, the provision of this field might
          depend on the fact whether an explicit consent to this specific
          additional account information has been given by the PSU.
        example: John Doe
        type: string
        maxLength: 140
      other:
        $ref: '#/definitions/otherType'
    required:
      - currency
      - cashAccountType
      - usage
  cardAccountDetails:
    title: cardAccountDetails
    description: Card account details.
    type: object
    properties:
      resourceId:
        description: >-
          This is the data element to be used in the path when retrieving data
          from a dedicated account.

          This shall be filled, if addressable resource are created by the ASPSP
          on the /card-accounts endpoint.
        type: string
      maskedPan:
        description: Masked Primary Account Number.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      currency:
        description: >-
          ISO 4217 Alpha 3 currency code. BOI REMARK - XXX for multicurrency
          account.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      ownerName:
        description: >-
          Name of the legal account owner.

          If there is more than one owner, then e.g. two names might be noted
          here.


          For a corporate account, the corporate name is used for this
          attribute.

          Even if supported by the ASPSP, the provision of this field might
          depend on the fact whether an explicit consent to this specific
          additional account information has been given by the PSU.
        example: John Doe
        type: string
        maxLength: 140
      name:
        description: >-
          Name of the account, as assigned by the ASPSP,

          in agreement with the account owner in order to provide an additional
          means of identification of the account.
        type: string
        maxLength: 70
      displayName:
        description: Name of the account as defined by the PSU within online channels.
        type: string
        maxLength: 70
      product:
        description: 'Product Name of the Bank for this account, proprietary definition.'
        type: string
        maxLength: 35
      status:
        $ref: '#/definitions/accountStatus'
      usage:
        $ref: '#/definitions/Usage'
      details:
        description: |-
          Specifications that might be provided by the ASPSP:
            - characteristics of the account
            - characteristics of the relevant card
        type: string
        maxLength: 1000
      creditLimit:
        $ref: '#/definitions/amount'
      balances:
        description: >-
          A list of balances regarding this account, e.g. the current balance,
          the last booked balance.

          The list might be restricted to the current balance.
        type: array
        items:
          $ref: '#/definitions/balance'
      _links:
        $ref: '#/definitions/_linksAccountDetails'
    required:
      - maskedPan
      - currency
      - usage
  accountList:
    title: accountList
    description: List of accounts with details.
    type: object
    properties:
      accounts:
        type: array
        items:
          $ref: '#/definitions/accountDetails'
    required:
      - accounts
  cardAccountList:
    title: cardAccountList
    description: List of card accounts with details.
    type: object
    properties:
      cardAccounts:
        type: array
        items:
          $ref: '#/definitions/cardAccountDetails'
    required:
      - cardAccounts
  accountReport:
    title: accountReport
    description: >-
      JSON based account report.

      This account report contains transactions resulting from the query
      parameters.


      'booked' shall be contained if bookingStatus parameter is set to "booked"
      or "both".


      'pending' is not contained if the bookingStatus parameter is set to
      "booked" or "information".


      'information' Only contained if the bookingStatus is set to "information"
      and if supported by ASPSP.
    type: object
    properties:
      booked:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/transactions'
      pending:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/transactions'
      information:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/transactions'
      _links:
        $ref: '#/definitions/_linksAccountReport'
    required:
      - _links
  cardAccountReport:
    title: cardAccountReport
    description: >-
      JSON based card account report.


      This card account report contains transactions resulting from the query
      parameters.
    type: object
    properties:
      booked:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/cardTransaction'
      pending:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/cardTransaction'
      _links:
        $ref: '#/definitions/_linksCardAccountReport'
    required:
      - booked
      - _links
  transactions:
    title: transactions
    description: Transaction details.
    type: object
    properties:
      transactionId:
        description: >-
          This identification is given by the attribute transactionId of the
          corresponding entry of a transaction list.
        example: 3dc3d5b3-7023-4848-9853-f5400a64e80f
        type: string
      entryReference:
        description: >-
          Is the identification of the transaction as used e.g. for reference
          for deltafunction on application level.

          The same identification as for example used within camt.05x messages.
        type: string
        maxLength: 35
      endToEndId:
        description: Unique end to end identity.
        type: string
        maxLength: 35
      batchIndicator:
        description: >-
          If this indicator equals true, then the related entry is a batch
          entry.
        type: boolean
      batchNumberOfTransactions:
        description: >-
          Shall be used if and only if the batchIndicator is contained and
          equals true.
        type: integer
        format: int32
      mandateId:
        description: 'Identification of Mandates, e.g. a SEPA Mandate ID.'
        type: string
        maxLength: 35
      checkId:
        description: Identification of a Cheque.
        type: string
        maxLength: 35
      creditorId:
        description: 'Identification of Creditors, e.g. a SEPA Creditor ID.'
        example: Creditor Id 5678
        type: string
        maxLength: 35
      bookingDate:
        description: The date when an entry is posted to an account on the ASPSPs books.
        type: string
        format: date
      valueDate:
        description: >-
          The Date at which assets become available to the account owner in case
          of a credit, or cease to be available to the account owner in case of
          a debit entry. **Usage:** If entry status is pending and value date is
          present, then the value date refers to an expected/requested value
          date.
        type: string
        format: date
      transactionAmount:
        $ref: '#/definitions/amount'
      currencyExchange:
        description: Array of exchange rates.
        type: array
        items:
          $ref: '#/definitions/reportExchangeRate'
      creditorName:
        description: Creditor name.
        example: Creditor Name
        type: string
        maxLength: 70
      creditorAccount:
        $ref: '#/definitions/accountReference'
      creditorAgent:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      ultimateCreditor:
        description: Ultimate creditor.
        example: Ultimate Creditor
        type: string
        maxLength: 70
      debtorName:
        description: Debtor name.
        example: Debtor Name
        type: string
        maxLength: 70
      debtorAccount:
        $ref: '#/definitions/accountReference'
      debtorAgent:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      ultimateDebtor:
        description: Ultimate debtor.
        example: Ultimate Debtor
        type: string
        maxLength: 70
      remittanceInformationUnstructured:
        description: Unstructured remittance information.
        example: Ref Number Merchant
        type: string
        maxLength: 140
      remittanceInformationUnstructuredArray:
        description: Array of unstructured remittance information.
        example:
          - Ref Number Merchant
          - Some Other Text
        type: array
        items:
          type: string
          maxLength: 140
        maxLength: 140
      entryDetails:
        description: >-
          Might be used by the ASPSP to transport details about transactions
          within a batch.
        type: array
        items:
          $ref: '#/definitions/EntryDetailsElement'
      additionalInformation:
        description: >-
          Might be used by the ASPSP to transport additional transaction related
          information to the PSU
        example: Some additional transaction related information.
        type: string
        maxLength: 500
      additionalInformationStructured:
        $ref: '#/definitions/additionalInformationStructured'
      purposeCode:
        $ref: '#/definitions/purposeCode'
      bankTransactionCode:
        description: >-
          Bank transaction code as used by the ASPSP and using the sub elements
          of this structured code defined by ISO 20022.


          This code type is concatenating the three ISO20022 Codes
            * Domain Code,
            * Family Code, and
            * SubFamiliy Code
          by hyphens, resulting in 'DomainCode'-'FamilyCode'-'SubFamilyCode'.
        example: PMNT-RDDT-ESDD
        type: string
      proprietaryBankTransactionCode:
        description: >-
          Proprietary bank transaction code as used within a community or within
          an ASPSP e.g.

          for MT94x based transaction reports.
        type: string
        maxLength: 35
      balanceAfterTransaction:
        $ref: '#/definitions/balance'
      _links:
        $ref: '#/definitions/_linksTransactionDetails'
    required:
      - transactionAmount
  cardTransaction:
    title: cardTransaction
    description: Card transaction information.
    type: object
    properties:
      cardTransactionId:
        description: Unique end to end identity.
        type: string
        maxLength: 35
      terminalId:
        description: 'Identification of the Terminal, where the card has been used.'
        type: string
        maxLength: 35
      transactionDate:
        description: Date of the actual card transaction.
        type: string
        format: date
      acceptorTransactionDateTime:
        description: Timestamp of the actual card transaction within the acceptance system
        type: string
        format: date-time
      bookingDate:
        description: The date when an entry is posted to an account on the ASPSPs books.
        type: string
        format: date
      valueDate:
        description: >-
          The Date at which assets become available to the account owner in case
          of a credit, or cease to be available to the account owner in case of
          a debit entry. For card transactions this is the payment due date of
          related booked transactions of a card. BOI Remarks - this fiels is
          mandatory for non pending transactions.
        type: string
        format: date
      transactionAmount:
        $ref: '#/definitions/amount'
      grandTotalAmount:
        $ref: '#/definitions/amount'
      currencyExchange:
        description: Array of exchange rates.
        type: array
        items:
          $ref: '#/definitions/reportExchangeRate'
      originalAmount:
        $ref: '#/definitions/amount'
      markupFee:
        $ref: '#/definitions/amount'
      markupFeePercentage:
        example: '0.3'
        type: string
      cardAcceptorId:
        type: string
        maxLength: 35
      cardAcceptorName:
        type: string
        maxLength: 70
      cardAcceptorAddress:
        $ref: '#/definitions/address'
      cardAcceptorPhone:
        description: >-
          Merchant phone number

          It consists of a "+" followed by the country code (from 1 to 3
          characters) then a "-" and finally, any

          combination of numbers, "(", ")", "+" and "-" (up to 30 characters).

          pattern according to ISO20022 \+[0-9]{1,3}-[0-9()+\-]{1,30}
        type: string
        pattern: '^\+[0-9]{1,3}\-[0-9()+\-]{1,30}$'
      merchantCategoryCode:
        description: Merchant category code.
        type: string
        minLength: 4
        maxLength: 4
      maskedPAN:
        description: Masked Primary Account Number.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      transactionDetails:
        type: string
        maxLength: 1000
      invoiced:
        type: boolean
      proprietaryBankTransactionCode:
        description: >-
          Proprietary bank transaction code as used within a community or within
          an ASPSP e.g.

          for MT94x based transaction reports.
        type: string
        maxLength: 35
    required:
      - transactionAmount
  transactionDetailsBody:
    title: transactionDetailsBody
    description: Transaction details.
    type: object
    properties:
      transactionDetails:
        $ref: '#/definitions/transactions'
    required:
      - transactionDetails
  reportExchangeRate:
    title: reportExchangeRate
    description: Exchange Rate.
    type: object
    properties:
      sourceCurrency:
        description: >-
          ISO 4217 Alpha 3 currency code. BOI REMARK - XXX for multicurrency
          account.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      exchangeRate:
        type: string
      unitCurrency:
        description: >-
          ISO 4217 Alpha 3 currency code. BOI REMARK - XXX for multicurrency
          account.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      targetCurrency:
        description: >-
          ISO 4217 Alpha 3 currency code. BOI REMARK - XXX for multicurrency
          account.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      quotationDate:
        type: string
        format: date
      contractIdentification:
        type: string
        maxLength: 35
    required:
      - sourceCurrency
      - exchangeRate
      - unitCurrency
      - targetCurrency
      - quotationDate
  balance:
    title: balance
    description: A single balance element.
    type: object
    properties:
      balanceAmount:
        $ref: '#/definitions/amount'
      balanceType:
        $ref: '#/definitions/balanceType'
      creditLimitIncluded:
        description: |-
          A flag indicating if the credit limit of the corresponding account
          is included in the calculation of the balance, where applicable.
        example: false
        type: boolean
      lastChangeDateTime:
        description: >-
          This data element might be used to indicate e.g. with the expected or
          booked balance that no action is known

          on the account, which is not yet booked.
        type: string
        format: date-time
      referenceDate:
        description: Indicates the date of the balance.
        type: string
        format: date
      lastCommittedTransaction:
        description: >-
          "entryReference" of the last commited transaction to support the TPP
          in identifying whether all

          PSU transactions are already known.
        type: string
        maxLength: 35
    required:
      - balanceAmount
      - balanceType
      - creditLimitIncluded
      - referenceDate
  address:
    title: address
    example:
      streetName: rue blue
      buildingnNumber: '89'
      townName: Paris
      postCode: '75000'
      country: FR
    type: object
    properties:
      streetName:
        type: string
        maxLength: 70
      buildingNumber:
        type: string
        maxLength: 10
      townName:
        type: string
        maxLength: 70
      postCode:
        type: string
        maxLength: 10
      country:
        description: ISO 3166 ALPHA2 country code.
        example: SE
        type: string
        pattern: '^[A-Z]{2}$'
    required:
      - country
  additionalInformationAccess:
    title: additionalInformationAccess
    description: >-
      Optional if supported by API provider.


      Is asking for additional information as added within this structured
      object.

      The usage of this data element requires at least one of the entries
      "accounts",

      "transactions" or "balances" also to be contained in the object.

      If detailed accounts are referenced, it is required in addition that any
      account addressed within

      the additionalInformation attribute is also addressed by at least one of
      the attributes "accounts",

      "transactions" or "balances".
    type: object
    properties:
      ownerName:
        description: >-
          Is asking for account owner name of the accounts referenced within.

          If the array is empty in the request, the TPP is asking for the
          account

          owner name of all accessible accounts.

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for accounts, balances or
          transactions shall be empty, if used.

          The ASPSP will indicate in the consent resource after a successful
          authorisation,

          whether the ownerName consent can be accepted by providing the
          accounts on which the ownerName will

          be delivered.

          This array can be empty.
        type: array
        items:
          $ref: '#/definitions/accountReference'
      trustedBeneficiaries:
        description: >-
          Optional if supported by API provider.

          Is asking for the trusted beneficiaries related to the accounts
          referenced within and related to the PSU.

          If the array is empty in the request, the TPP is asking for the lists
          of trusted beneficiaries of all accessible accounts.

          This may be restricted in a PSU/ASPSP authorization dialogue by the
          PSU if also the account lists addressed

          by the tags “accounts”, “balances” or “transactions” are empty.

          The ASPSP will indicate in the consent resource after a successful
          authorisation,

          whether the trustedBeneficiaries consent can be accepted by providing
          the accounts on which the list of trusted beneficiaries will be
          delivered.

          This array can be empty.
        type: array
        items:
          $ref: '#/definitions/accountReference'
  amount:
    title: amount
    example:
      currency: EUR
      amount: '123'
    type: object
    properties:
      currency:
        description: >-
          ISO 4217 Alpha 3 currency code. BOI REMARK - XXX for multicurrency
          account.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      amount:
        description: >-
          The amount given with fractional digits, where fractions must be
          compliant to the currency definition.

          Up to 14 significant figures. Negative amounts are signed by minus.

          The decimal separator is a dot.


          **Example:**

          Valid representations for EUR with up to two decimals are:

            * 1056
            * 5768.2
            * -1.50
            * 5877.78
        example: '5877.78'
        type: string
        pattern: '^-?[0-9]{1,14}(\.[0-9]{1,3})?$'
    required:
      - currency
      - amount
  consentCurrencyCode:
    title: consentCurrencyCode
    description: >-
      In the Israeli market there are 3 options for currency code in post
      consent for CACC-
       * "ILS" - consent just for the ILS local currency.
       * "ILY" - consent just for all foreign currencies.
       * empty [] - consent for all currencies.

      If the user want a multicurrency consent, this field should be empty.
    example: ILS
    type: string
    enum:
      - ILS
      - ILY
  EntryDetailsElement:
    title: EntryDetailsElement
    type: object
    properties:
      endToEndId:
        description: Unique end to end identity.
        type: string
        maxLength: 35
      mandateId:
        description: 'Identification of Mandates, e.g. a SEPA Mandate ID.'
        type: string
        maxLength: 35
      checkId:
        description: Identification of a Cheque.
        type: string
        maxLength: 35
      creditorId:
        description: 'Identification of Creditors, e.g. a SEPA Creditor ID.'
        example: Creditor Id 5678
        type: string
        maxLength: 35
      transactionAmount:
        $ref: '#/definitions/amount'
      currencyExchange:
        description: Array of exchange rates.
        type: array
        items:
          $ref: '#/definitions/reportExchangeRate'
      creditorName:
        description: Creditor name.
        example: Creditor Name
        type: string
        maxLength: 70
      creditorAccount:
        $ref: '#/definitions/accountReference'
      creditorAgent:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      ultimateCreditor:
        description: Ultimate creditor.
        example: Ultimate Creditor
        type: string
        maxLength: 70
      debtorName:
        description: Debtor name.
        example: Debtor Name
        type: string
        maxLength: 70
      debtorAccount:
        $ref: '#/definitions/accountReference'
      debtorAgent:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      ultimateDebtor:
        description: Ultimate debtor.
        example: Ultimate Debtor
        type: string
        maxLength: 70
      remittanceInformationUnstructured:
        description: Unstructured remittance information.
        example: Ref Number Merchant
        type: string
        maxLength: 140
      remittanceInformationUnstructuredArray:
        description: Array of unstructured remittance information.
        example:
          - Ref Number Merchant
          - Some Other Text
        type: array
        items:
          type: string
          maxLength: 140
        maxLength: 140
      purposeCode:
        $ref: '#/definitions/purposeCode'
    required:
      - transactionAmount
  additionalInformationStructured:
    title: additionalInformationStructured
    description: >-
      Is used if and only if the bookingStatus entry equals "information".

      Every active standing order related to the dedicated payment account
      result into one entry.
    type: object
    properties:
      standingOrderDetails:
        $ref: '#/definitions/standingOrderDetails'
    required:
      - standingOrderDetails
  standingOrderDetails:
    title: standingOrderDetails
    description: Details of underlying standing orders.
    type: object
    properties:
      startDate:
        description: >-
          The first applicable day of execution starting from this date is the
          first payment.
        type: string
        format: date
      frequency:
        $ref: '#/definitions/frequencyCode'
      endDate:
        description: |-
          The last applicable day of execution.
          If not given, it is an infinite standing order.
        type: string
        format: date
      executionRule:
        $ref: '#/definitions/executionRule'
      withinAMonthFlag:
        description: >-
          This element is only used in case of frequency equals "Monthly".


          If this element equals false it has no effect.

          If this element equals true, then the execution rule is overruled if
          the day of execution would fall into a different month using the
          execution rule.


          Example: executionRule equals "preceding", dayOfExecution equals "02"
          and the second of a month is a Sunday.

          In this case, the transaction date would be on the last day of the
          month before.
           This would be overruled if withinAMonthFlag equals true and the payment is processed on Monday the third of the Month.
          Remark: This attribute is rarely supported in the market.
        type: boolean
    required:
      - startDate
      - frequency
