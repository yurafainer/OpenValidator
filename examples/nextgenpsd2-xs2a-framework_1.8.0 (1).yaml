          description: >-
            The forwarded Geo Location of the corresponding http request between
            PSU and TPP if available.
        - name: Content-Type
          in: header
          required: false
          enum:
            - application/json
          type: string
          description: ''
        - name: body
          in: body
          required: true
          description: >-
            JSON request body for a payment inition request message.


            There are the following payment-products supported:
              * "masav" with JSON-Body
              * "zahav" with JSON-Body
              * "FP" with JSON-Body
              * "swift" with JSON-Body


            There are the following payment-services supported:
              * "payments"
              * "bulk-payments" - optional
              * "periodic-payments" - optional

            All optional, conditional and predefined but not yet used fields are
            defined.
          schema:
            example:
              instructedAmount:
                currency: EUR
                amount: '123.50'
              debtorAccount:
                iban: DE40100100103307118608
              creditorName: Merchant123
              creditorAccount:
                iban: DE02100100109307118603
              remittanceInformationUnstructured: Ref Number Merchant
