    title: paymentInitiationStatusResponse-200_json
    description: >-
      Body of the response for a successful payment initiation status request in
      case of an JSON based endpoint. *Remark:* If the PSU does not complete a
      required SCA within the required timeframe the payment resource's status
      must be set to "RJCT". Particularly, if a multi-level-SCA is required and
      the number of successful SCAs during the required timeframe is
      insufficient, the status must also be set to "RJCT".
    type: object
    properties:
      transactionStatus:
        $ref: '#/definitions/transactionStatus'
      psuMessage:
        description: Text to be displayed to the PSU.
        type: string
        maxLength: 500
      _links:
        description: >-
          Should refer to next steps if the problem can be resolved via the
          interface e.g. for re-submission of credentials.
        example:
          self:
            href: /psd2/v1/payments/sepa-credit-transfers/1234-wertiq-983
        type: object
        additionalProperties:
          $ref: '#/definitions/hrefType'
      tppMessage:
        description: Messages to the TPP on operational issues.
        type: array
        items:
          $ref: '#/definitions/tppMessageGeneric'
    required:
      - transactionStatus
      - psuMessage
