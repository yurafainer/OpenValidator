    title: paymentInitationRequestResponse-201
    description: Body of the response for a successful payment initiation request.
    type: object
    properties:
      transactionStatus:
        $ref: '#/definitions/transactionStatus'
      paymentId:
        description: Resource identification of the generated payment initiation resource.
        example: 1234-wertiq-983
        type: string
      transactionFees:
        $ref: '#/definitions/amount'
      currencyConversionFee:
        $ref: '#/definitions/amount'
      estimatedTotalAmount:
        $ref: '#/definitions/amount'
      estimatedInterbankSettlementAmount:
        $ref: '#/definitions/amount'
      transactionFeeIndicator:
        description: >-
          If equals 'true', the transaction will involve specific transaction
          cost as shown by the ASPSP in

          their public price list or as agreed between ASPSP and PSU.

          If equals 'false', the transaction will not involve additional
          specific transaction costs to the PSU unless the fee amount is given
          specifically in the data elements transactionFees and/or
          currencyConversionFees.

          If this data element is not used, there is no information about
          transaction fees unless the fee amount is given explicitly in the data
          element transactionFees and/or currencyConversionFees.
        type: boolean
      _links:
        $ref: '#/definitions/_linksPaymentInitiation'
      psuMessage:
        description: Text to be displayed to the PSU.
        type: string
        maxLength: 500
      tppMessages:
        type: array
        items:
          $ref: '#/definitions/tppMessage201PaymentInitiation'
    required:
      - transactionStatus
      - paymentId
      - _links
