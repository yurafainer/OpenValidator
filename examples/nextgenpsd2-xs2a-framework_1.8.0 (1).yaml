    tokenUrl: 'https://$(catalog.url)/accesscodeoauthprovider/oauth2/token'
    scopes:
      sample_scope_1: Sample scope description 1
  clientIdHeader:
    type: apiKey
    name: X-IBM-Client-Id
    in: header
    x-key-type: client_id
  PaymentOAuthSecDef:
    type: oauth2
    flow: accessCode
    x-ibm-oauth-provider: paymentoauthprovider
    authorizationUrl: 'https://$(catalog.url)/paymentoauthprovider/oauth2/authorize'
    tokenUrl: 'https://$(catalog.url)/paymentoauthprovider/oauth2/token'
    scopes:
      sample_scope_1: Sample scope description 1
