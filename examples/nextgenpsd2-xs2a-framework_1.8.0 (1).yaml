    put:
      description: >
        This method update PSU data on the consents  resource if needed.

        It may authorise a consent within the Embedded SCA Approach where
        needed.


        Independently from the SCA Approach it supports e.g. the selection of

        the authentication method and a non-SCA PSU authentication.


        This methods updates PSU data on the cancellation authorisation resource
        if needed.


        There are several possible update PSU data requests in the context of a
        consent request if needed,

        which depends on the SCA approach:


        * Redirect SCA Approach:
          A specific Update PSU data request is applicable for
            * the selection of authentication methods, before choosing the actual SCA approach.
        * Decoupled SCA Approach:
          A specific update PSU data request is only applicable for
          * adding the PSU Identification, if not provided yet in the payment initiation request or the Account Information Consent Request, or if no OAuth2 access token is used, or
          * the selection of authentication methods.


        The SCA Approach might depend on the chosen SCA method.

        For that reason, the following possible update PSU data request can
        apply to all SCA approaches:


        * Select an SCA method in case of several SCA methods are available for
        the customer.


        There are the following request types on this access path:
          * Update PSU identification

          * Select PSU autorization method
            WARNING: This method needs a reduced header,
            therefore many optional elements are not present.
            Maybe in a later version the access path will change.
      summary: updateConsentsPsuData
      tags:
        - Account Information Service (AIS)
        - Common Services
      operationId: updateConsentsPsuData
      deprecated: false
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - name: consentId
          in: path
          required: true
          type: string
          maxLength: 512
          description: >-
            ID of the corresponding consent object as returned by an account
            information consent request.
        - name: authorisationId
          in: path
          required: true
          type: string
          description: Resource identification of the related SCA.
        - name: X-Request-ID
          in: header
          required: true
          type: string
          format: uuid
          description: >-
            ID of the request, unique to the call, as determined by the
            initiating party.
        - name: Digest
          in: header
          required: true
          type: string
          description: >-
            Is contained if and only if the "Signature" element is contained in
            the header of the request.
        - name: Signature
          in: header
          required: true
          type: string
          description: >-
            A signature of the request by the TPP on application level. This
            might be mandated by ASPSP.
        - name: TPP-Signature-Certificate
          in: header
          required: true
          type: string
          description: |-
            The certificate used for signing the request, in base64 encoding.
            Must be contained if a signature is contained.
        - name: PSU-ID
          in: header
          required: true
          type: string
          pattern: '^([0-9]{9}|[A-Za-z]{2}-([A-Za-z0-9]){1,16})$'
          description: >-
            BOI-REMARK - The PSU id number or passport number.

            Possible values are:

            * ID = only digits.

            * Passport =  2 characters ISO 3166 country code + '-' + Passport
            number.
        - name: PSU-ID-Type
          in: header
          required: false
          type: string
          maxLength: 512
          description: >-
            BOI-REMARK - Specific brands or channels of the ASPSP only in case
            there is more than one.

            Possible values should be found in ASPSP's documentation and get
            approved in advance by BOI.
        - name: PSU-Corporate-ID
          in: header
          required: false
          type: string
          pattern: '^[A-Z]{2}[-]\d{9}|\d{9}$'
          description: >-
            Might be mandated in the ASPSP's documentation. Only used in a
            corporate context.
        - name: PSU-Corporate-ID-Type
