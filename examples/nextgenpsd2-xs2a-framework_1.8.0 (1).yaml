    title: executionRule
    description: >-
      "following" or "preceding" supported as values.

      This data attribute defines the behaviour when recurring payment dates
      falls on a weekend or bank holiday.

      The payment is then executed either the "preceding" or "following" working
      day.

      ASPSP might reject the request due to the communicated value, if rules in
      Online-Banking are not supporting

      this execution rule.
    type: string
    enum:
      - following
      - preceding
  paymentInitiation_json:
    title: paymentInitiation_json
    description: >-
      Generic Body for a payment initation via JSON.


      This generic JSON body can be used to represent valid payment initiations
      for the following JSON based payment product,

      which where defined in the Implementation Guidelines:
         * masav
         * zahav
         * FP
         * swift

      For the convenience of the implementer additional which are already
      predefinded in the Implementation Guidelines

      are included (but commented in source code), such that an ASPSP may add
      them easily.


      Take care: Since the format is intended to fit for all payment products

      there are additional conditions which are NOT covered by this
      specification.

      Please check the Implementation Guidelines for detailes.



      The following data element are depending on the actual payment product
      available (in source code)

       <table style="width:100%">
       <tr><th>Data Element</th><th>Type</th><th>masav</th><th>zahav</th><th>fp</th><th>swift</th></tr>
       <tr><td>endToEndIdentification</td><td> Max35Text</td><td> optional</td> <td>optional</td><td>optional</td><td>optional</td> </tr>
       <tr><td>debtorAccount</td><td> Account Reference</td> <td>mandatory and optional for post payment</td> <td>mandatory and optional for post payment</td><td>mandatory and optional for post payment</td><td>mandatory and optional for post payment</td> </tr>
       <tr><td>debtorId</td><td> Max35Text</td> <td>Conditional</td> <td>Conditional</td><td>Conditional</td><td>Conditional</td></tr>
       <tr><td>ultimateDebtor</td> <td>Max70Text</td> <td>Conditional</td> <td>Conditional</td><td>Conditional</td> <td>Conditional</td> </tr>
       <tr><td>instructedAmount</td> <td>Amount</td> <td>mandatory</td> <td>mandatory</td><td>mandatory</td><td>mandatory</td></tr>
       <tr><td>CurrencyOfTransfer</td> <td>CurrencyCode</td> <td>n.a.</td> <td>n.a.</td><td>n.a.</td> <td>n.a.</td></tr>
       <tr><td>exchangeRateInformation</td> <td>Payment Exchange Rate</td> <td>n.a.</td><td>n.a.</td><td>n.a.</td> <td>n.a.</td></tr>
       <tr><td>creditorAccount</td> <td>Account Reference</td> <td>mandatory</td> <td>mandatory</td><td>mandatory</td><td>mandatory</td>  </tr>
       <tr><td>creditorAgent</td> <td>BICFI</td> <td>optional</td> <td>optional</td><td>optional</td><td>optional</td>  </tr>
       <tr><td>creditorAgentName</td> <td>Max140Text</td> <td>n.a.</td> <td>n.a.</td><td>n.a.</td> <td>n.a.</td> </tr>
       <tr><td>creditorName</td> <td>Max70Text</td> <td>mandatory</td> <td>mandatory</td><td>mandatory</td> <td>mandatory</td> </tr>
       <tr><td>creditorId</td> <td>Max35Text</td> <td>Conditional if supported by API provider</td> <td>Conditional if supported by API provider</td><td>Conditional if supported by API provider</td><td>Conditional if supported by API provider</td></tr>
       <tr><td>creditorAddress</td>Address</td> <td>optional</td> <td>optional</td><td>optional</td> <td>optional</td></tr>
       <tr><td>creditorNameAndAddress</td> <td>Max140Text</td> <td>n.a.</td> <td>n.a.</td><td>n.a.</td><td>n.a.</td>  </tr>
       <tr><td>ultimateCreditor</td> <td>Max70Text</td> <td>n.a.</td> <td>n.a.</td><td>n.a.</td> <td>n.a.</td> </tr>
       <tr><td>purposeCode</td> <td>Purpose Code</td> <td>Conditional</td> <td>Conditional</td><td>Conditional</td><td>Conditional</td> </tr>
       <tr><td>chargeBearer</td> <td>Charge Bearer</td> <td>n.a.</td> <td>n.a.</td><td>n.a.</td> <td>n.a.</td> </tr>
       <tr><td>serviceLevel</td> <td>Service Level Code</td> <td>n.a.</td> <td>n.a.</td><td>n.a.</td> <td>n.a.</td> </tr>
       <tr><td>remittanceInformationUnstructured</td> <td>Max140Text</td> <td>mandatory</td> <td> mandatory</td><td> mandatory</td> <td> mandatory</td> </tr>
       <tr><td>remittanceInformationUnstructuredArray</td> <td>Array of Max140Text</td> <td>Conditional</td> <td>Conditional</td><td>Conditional</td><td>Conditional</td></tr>
       <tr><td>requestedExecutionDate</td> <td>ISODate</td> <td>{Or -Mandatory for Future Dated Payments</td> <td>n.a.</td><td>{Or -Mandatory for Future Dated Payments</td><td>n.a.</td> </tr>
       <tr><td>requestedExecutionTime</td> <td>ISODateTime</td> <td>Or -Mandatory for Future Dated Payments}</td> <td>n.a.</td><td>Or -Mandatory for Future Dated Payments}</td> <td>n.a.</td></tr>
          </td></tr>
        </table>

      IMPORTANT: In this API definition the following holds:
        *  All data elements mentioned above are defined, but some of them are commented,
          i.e. they are only visible in the source code and can be used by uncommenting them.
        * Data elements which are mandatory in the table above for all payment products
          are set to be mandatory in this specification.
        * Data elements which are indicated in the table above as n.a. for all payment products are commented in the source code.
        * Data elements which are indicated to be option, conditional or mandatory for at least one payment product
          in the table above are set to be optional in the s specification except the case where all are definde to be mandatory.
        * Data element which are inticated to be n.a. can be used by the ASPS if needed.
          In this case uncomment tthe the relatetd lines in the source code.
        * If one uses this data types for some payment products he has to ensure that the used data type is
          valid according to the underlying payment product, e.g. by some appropriate validations.
    type: object
    properties:
      endToEndIdentification:
        type: string
        maxLength: 35
      debtorAccount:
        $ref: '#/definitions/accountReference'
      debtorId:
        description: Debtor Id.
        example: Debtor Id 1234
        type: string
        maxLength: 35
      ultimateDebtor:
        description: Ultimate debtor.
        example: Ultimate Debtor
        type: string
        maxLength: 70
      instructedAmount:
        $ref: '#/definitions/amount'
      creditorAccount:
        $ref: '#/definitions/accountReference'
      creditorAgent:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      creditorName:
        description: Creditor name.
        example: Creditor Name
        type: string
        maxLength: 70
      creditorAddress:
        $ref: '#/definitions/address'
      creditorId:
        description: 'Identification of Creditors, e.g. a SEPA Creditor ID.'
        type: string
        maxLength: 35
      purposeCode:
        $ref: '#/definitions/purposeCode'
      remittanceInformationUnstructured:
        description: Unstructured remittance information.
        example: Ref Number Merchant
        type: string
        maxLength: 140
      remittanceInformationUnstructuredArray:
        description: Array of unstructured remittance information.
        example:
          - Ref Number Merchant
          - Some Other Text
        type: array
        items:
          type: string
          maxLength: 140
        maxLength: 140
      requestedExecutionDate:
        type: string
        format: date
      requestedExecutionTime:
        type: string
        format: date-time
    required:
      - instructedAmount
      - creditorAccount
      - creditorName
      - remittanceInformationUnstructured
  paymentInitiationBulkElement_json:
    title: paymentInitiationBulkElement_json
    description: >-
      Generic body for a bulk payment initation entry.


      The bulk entry type is a type which follows the JSON formats for the
      supported products for single payments

      excluding the data elements (if supported):
        * debtorAccount
        * requestedExecutionDate,
        * requestedExecutionTime.
      These data elements may not be contained in any bulk entry.


      This data object can be used to represent valid bulk payment initiations
      entry for the following JSON based payment product,

      which where defined in the Implementation Guidelines:


        * masav
        * zahav
        * FP
        * swift

      For the convenience of the implementer additional which are already
      predefinded in the Implementation Guidelines

      are included (but commented in source code), such that an ASPSP may add
      them easily.


      Take care: Since the format is intended to fit for all payment products

      there are additional conditions which are NOT covered by this
      specification.

      Please check the Implementation Guidelines for detailes.
    type: object
    properties:
      endToEndIdentification:
        type: string
        maxLength: 35
      instructedAmount:
        $ref: '#/definitions/amount'
      creditorAccount:
        $ref: '#/definitions/accountReference'
      creditorAgent:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      creditorAgentName:
        description: Creditor agent name.
        example: Creditor Agent Name
        type: string
        maxLength: 140
      creditorName:
        description: Creditor name.
        example: Creditor Name
        type: string
        maxLength: 70
      creditorAddress:
        $ref: '#/definitions/address'
      creditorId:
        description: 'Identification of Creditors, e.g. a SEPA Creditor ID.'
        example: Creditor Id 5678
        type: string
        maxLength: 35
      purposeCode:
        $ref: '#/definitions/purposeCode'
      remittanceInformationUnstructured:
        description: Unstructured remittance information.
        example: Ref Number Merchant
        type: string
        maxLength: 140
      remittanceInformationUnstructuredArray:
        description: Array of unstructured remittance information.
        example:
          - Ref Number Merchant
          - Some Other Text
        type: array
        items:
          type: string
          maxLength: 140
        maxLength: 140
    required:
      - instructedAmount
      - creditorAccount
      - creditorName
      - remittanceInformationUnstructured
  periodicPaymentInitiation_json:
    title: periodicPaymentInitiation_json
    description: >-
      Generic Body for a periodic payment initation via JSON.


      This generic JSON body can be used to represent valid periodic payment
      initiations for the following JSON based payment product,

      which where defined in the Implementation Guidelines:

        * masav
        * zahav
        * FP
        * swift

      For the convenience of the implementer additional which are already
      predefinded in the Implementation Guidelines

      are included (but commented in source code), such that an ASPSP may add
      them easily.


      Take care: Since the format is intended to fit for all payment products

      there are additional conditions which are NOT covered by this
      specification.

      Please check the Implementation Guidelines for detailes.



      The following data element are depending on the actual payment product
      available (in source code):


      IMPORTANT: In this API definition the following holds:
        *  All data elements mentioned above are defined, but some of them are commented,
          i.e. they are only visible in the source code and can be used by uncommenting them.
        * Data elements which are mandatory in the table above for all payment products
          are set to be mandatory in this specification.
        * Data elements which are indicated in the table above as n.a. for all payment products are commented in the source code.
        * Data elements which are indicated to be option, conditional or mandatory for at least one payment product
          in the table above are set to be optional in the s specification except the case where all are definde to be mandatory.
        * Data element which are inticated to be n.a. can be used by the ASPS if needed.
          In this case uncomment tthe the relatetd lines in the source code.
        * If one uses this data types for some payment products he has to ensure that the used data type is
          valid according to the underlying payment product, e.g. by some appropriate validations.
    type: object
    properties:
      endToEndIdentification:
        type: string
        maxLength: 35
      debtorId:
        description: Debtor Id.
        example: Debtor Id 1234
        type: string
        maxLength: 35
      debtorAccount:
        $ref: '#/definitions/accountReference'
      ultimateDebtor:
        description: Ultimate debtor.
        example: Ultimate Debtor
        type: string
        maxLength: 70
      instructedAmount:
        $ref: '#/definitions/amount'
      creditorAccount:
        $ref: '#/definitions/accountReference'
      creditorAgent:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      creditorId:
        description: 'Identification of Creditors, e.g. a SEPA Creditor ID.'
        type: string
        maxLength: 35
      creditorName:
        description: Creditor name.
        example: Creditor Name
        type: string
        maxLength: 70
      creditorAddress:
        $ref: '#/definitions/address'
      purposeCode:
        $ref: '#/definitions/purposeCode'
      remittanceInformationUnstructured:
        description: Unstructured remittance information.
        example: Ref Number Merchant
        type: string
        maxLength: 140
      remittanceInformationUnstructuredArray:
        description: Array of unstructured remittance information.
        example:
          - Ref Number Merchant
          - Some Other Text
        type: array
        items:
          type: string
          maxLength: 140
        maxLength: 140
      requestedExecutionDate:
        type: string
        format: date
      requestedExecutionTime:
        type: string
        format: date-time
      startDate:
        description: >-
          The first applicable day of execution starting from this date is the
          first payment.
        type: string
        format: date
      endDate:
        description: |-
          The last applicable day of execution.
          If not given, it is an infinite standing order.
        type: string
        format: date
      executionRule:
        $ref: '#/definitions/executionRule'
      frequency:
        $ref: '#/definitions/frequencyCode'
      dayOfExecution:
        $ref: '#/definitions/dayOfExecution'
      monthsOfExecution:
        description: >-
          The format is following the regular expression \d{1,2}.

          The array is restricted to 11 entries.

          The values contained in the array entries shall all be different and
          the maximum value of one entry is 12.

          This attribute is contained if and only if the frequency equals
          "MonthlyVariable".

          Example: An execution on January, April and October each year is
          addressed by ["1", "4", "10"].
        type: array
        items:
          $ref: '#/definitions/monthsOfExecution'
          maxLength: 2
        maxLength: 2
        maxItems: 11
    required:
      - instructedAmount
      - creditorAccount
      - creditorName
      - remittanceInformationUnstructured
      - startDate
      - frequency
  bulkPaymentInitiation_json:
    title: bulkPaymentInitiation_json
    description: |-
      Generic Body for a bulk payment initation via JSON.

      paymentInformationId is contained in code but commented since it is n.a.
      and not all ASPSP are able to support this field now.
      In a later version the field will be mandatory.
    type: object
    properties:
      batchBookingPreferred:
        description: >-
          If this element equals 'true', the PSU prefers only one booking entry.

          If this element equals 'false', the PSU prefers individual booking of
          all contained individual transactions.


          The ASPSP will follow this preference according to contracts agreed on
          with the PSU.
        example: false
        type: boolean
      debtorAccount:
        $ref: '#/definitions/accountReference'
      requestedExecutionDate:
        type: string
        format: date
      requestedExecutionTime:
        type: string
        format: date-time
      payments:
        description: >-
          A list of generic JSON bodies payment initations for bulk payments via
          JSON.


          Note: Some fields from single payments do not occcur in a bulk payment
          element
        type: array
        items:
          $ref: '#/definitions/paymentInitiationBulkElement_json'
    required:
      - payments
  consents:
    title: consents
    description: Content of the body of a consent request.
    type: object
    properties:
      access:
        $ref: '#/definitions/accountAccess'
      recurringIndicator:
        description: >-
          "true", if the consent is for recurring access to the account data.


          "false", if the consent is for one access to the account data.

          BOI Remarks:

          If false it means that the consent is valid for two hours from the
          moment of sending GET call (except get consent request and get consent
          status).
        example: false
        type: boolean
      validUntil:
        description: >-
          This parameter is defining a valid until date (including the mentioned
          date) for the requested consent.

          The content is the local ASPSP date in ISO-Date format, e.g.
          2017-10-30.


          Future dates might get adjusted by ASPSP.


          If a maximal available date is requested, a date in far future is to
          be used: "9999-12-31".


          In both cases the consent object to be retrieved by the get consent
          request will contain the adjusted date.
        example: '2020-12-31T00:00:00.000Z'
        type: string
        format: date
      frequencyPerDay:
        description: >-
          This field indicates the requested maximum frequency for an access
          without PSU involvement per day.

          For a one-off access, this attribute is set to "1".


          The frequency needs to be greater equal to one.


          If not otherwise agreed bilaterally between TPP and ASPSP, the
          frequency is less equal to 4.
        example: 100
        type: integer
        default: '100'
        format: int32
      combinedServiceIndicator:
        description: >-
          If "true" indicates that a payment initiation service will be
          addressed in the same "session".
        example: false
        type: boolean
    required:
      - access
      - recurringIndicator
      - validUntil
      - frequencyPerDay
      - combinedServiceIndicator
