  '/v1.8.0/cards/{card-id}/transactions':
    get:
      description: |
        Reads transactions of a given card addressed by "card-id".
      summary: getCardTransactionList
      tags:
        - cards
        - account data
        - transactions
      operationId: getCardTransactionList
      deprecated: false
      produces:
        - application/json
        - application/problem+json
      parameters:
        - name: card-id
          in: path
          required: true
          type: string
          description: >-
            This identification is denoting the addressed card. The card-id is
            retrieved by using a "Read Card List" call. 

            The card-id is the "resourceId" attribute of the card structure. Its
            value is constant at least throughout the lifecycle 

            of a given consent.
        - name: dateFrom
          in: query
          required: false
          type: string
          format: date
          description: >-
            Conditional: Starting date (inclusive the date dateFrom) of the
            transaction list, mandated if no delta access is required

            and if bookingStatus does not equal "information".

            For booked transactions, the relevant date is the booking date. 

            For pending transactions, the relevant date is the entry date, which
            may not be transparent 

            neither in this API nor other channels of the ASPSP.


            Optional: For card balances. This parameter is ignored by the ASPSP
            if it is not supported. 

            Requests in addition to the balances of the current accounting
            period all booked balances at the end of previous accounting periods
            (e.g. monthly periods) from the provided date on if still
            retrievable under the given consent.

            Note: The accounting period for card balances is the invoicing
            period of the related card.

            This parameter is ignored by the ASPSP if it is not supported.

            A TPP may not include both parameters "dateFrom" and "valueDateFrom"
            in one request.

            BOI REMARK: The parameter "dateFrom" may only be used, if it is
            supported by the ASPSP.

            The ASPSP must support at least one of the query parameters
            "dateFrom" and "valueDateFrom".

            This parameter is relevant only for differed debit card or credit
            card. 

            If this parameter is empty, the TPP will get the balances for the
            last cycle (closing booked) and the balances for the current cycle
            (interim booked). 

            The earliest date can be at least 12 month prior to "now".
        - name: valueDateFrom
          in: query
          required: false
          type: string
          format: date
          description: >-
            Conditional if supported by API provider.

            Requests in addition to the balances of the current accounting
            period all balances at the end of previous accounting periods (e.g.
            monthly periods) with payment due date starting from the provided
            date on if still retrievable under the given consent. 

            A TPP may not include both parameters "dateFrom" and "valueDateFrom"
            in one request.

            Note: The accounting period is the invoicing period of the related
            card.

            This parameter is ignored by the ASPSP if it is not supported. 


            BOI REMARK: The earliest date can be at least 12 month prior to
            "now".
        - name: dateTo
          in: query
          required: false
          type: string
          format: date
          description: >-
            End date (inclusive the data dateTo) of the transaction list,
            default is "now" if not given. 

            Might be ignored if a delta function is used.

            For booked transactions, the relevant date is the booking date. 

            For pending transactions, the relevant date is the entry date, which
            may not be transparent 

            neither in this API nor other channels of the ASPSP.
        - name: valueDateTo
          in: query
          required: false
          type: string
          format: date
          description: >-
            End date (inclusive the data dateTo) of the transaction list with
            regards to element "valueDate", default is "now" if not given.

            "valueDateTo" must not be included in the request, if parameter
            "valueDateFrom" is not included.

            The parameter "valueDateTo" may only be used, if it is supported by
            the ASPSP. The ASPSP must support if it supports query parameter
            "valueDateFrom".
        - name: bookingStatus
          in: query
          required: true
          enum:
            - booked
            - pending
            - both
          type: string
          description: >-
            Permitted codes are 
              * "booked",
              * "pending",
              * "both",
            "booked" shall be supported by the ASPSP.

            To support the "pending" and "both" feature is optional for the
            ASPSP, 

            Error code if not supported in the online banking frontend.

            If supported, "both" means to request transaction reports of
            transaction of bookingStatus either "pending" or "booked".

            BOI-REMARK: "pending" must be supported by the API provider if
            supported in the online banking frontend.
        - name: deltaList
          in: query
          required: false
          type: boolean
          description: >-
            This data attribute is indicating that the AISP is in favour to get
            all transactions after the last report access for this PSU on the
            addressed account. This is another implementation of a delta
            access-report. This delta indicator might be rejected by the ASPSP
            if this function is not supported. Optional if supported by API
            provider
        - name: X-Request-ID
          in: header
          required: true
          type: string
          format: uuid
          description: >-
            ID of the request, unique to the call, as determined by the
            initiating party.
        - name: Consent-ID
          in: header
          required: true
          type: string
          description: Identification of the corresponding consent as granted by the PSU.
        - name: Digest
          in: header
          required: true
          type: string
          maxLength: 1024
          description: >-
            Is contained if and only if the "Signature" element is contained in
            the header of the request.
        - name: Signature
          in: header
          required: true
          type: string
          maxLength: 4096
          description: >-
            A signature of the request by the TPP on application level. This
            might be mandated by ASPSP.
        - name: TPP-Signature-Certificate
          in: header
          required: true
          type: string
          description: |-
            The certificate used for signing the request, in base64 encoding. 
            Must be contained if a signature is contained.
        - name: PSU-IP-Address
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Address header field consists of the corresponding
            http request IP Address field between PSU and TPP.
        - name: Authorization
          in: header
          required: false
          type: string
          description: >-
            Is contained only, if an OAuth2 based SCA was performed in the
            corresponding mandate transaction or if OAuth2 has been used in 

            a pre-step.
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/readCardTransactionsResponse-200_json'
          examples:
            application/json:
              card:
                maskedPan: 525412xxxxxx3241
              cardTransactions:
                booked:
                  - cardTransactionId: '201710020036959'
                    transactionAmount:
                      currency: EUR
                      amount: '256.67'
                    grandTotalAmount:
                      currency: EUR
                      amount: '2566.70'
                    transactionDate: '2017-10-25T00:00:00.000Z'
                    bookingDate: '2017-10-26T00:00:00.000Z'
                    valueDate: '2017-11-01T00:00:00.000Z'
