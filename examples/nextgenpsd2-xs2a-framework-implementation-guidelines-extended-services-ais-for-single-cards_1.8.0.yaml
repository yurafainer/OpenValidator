swagger: '2.0'
info:
  title: >-
    NextGenPSD2 XS2A Framework Implementation Guidelines Extended Services AIS
    for Single Cards
  x-ibm-name: >-
    nextgenpsd2-xs2a-framework-implementation-guidelines-extended-services-ais-for-single-cards
  version: 1.8.0
  description: >
    # Summary

    As before, specific card reconciliation accounts (called "card accounts" in
    [XS2A-IG]) can be addressed in a consent request by 

    identifying the card account by its corresponding masked PAN. Please note
    that the card accounts are providing card information in an 

    accumulated way.

    In addition, this specification adds to this consent model, that a masked
    PAN is addressing a single card.

    It is up to the ASPSP if this consent grants access
      - to the single card identified by the masked PAN,
      - the card account identified by the masked PAN or
      - both,
    delivering these information on the related endpoints /card-accounts or
    /cards. The ASPSP's respective decision must be documented by 

    the ASPSP.

    Additionally, a card account or single cards can be addressed by an Account
    Access Object containing an identifier of the 

    reconciliation account accompanied by the specification of the
    cashAccountType to Type "CARD" (see Section 6.3). A consent of this 

    type will grant the respective access to both,
      - all cards reconciled through this account and
      - the related card account,
    if the ASPSP supports the corresponding endpoints at all.

    As a third / fourth way to establish a card specific consent, the TPP can
    request a bank-offered consent or a global consent but 

    restricting the requested access to a certain cashAccountType - e.g. CARD. A
    consent of this type will grant the respective access 

    to both
      - cards and
      - card accounts,
    if the ASPSP supports the related endpoints at all.

    BOI-REMARK: In the Israeli market there is no need in explicit consent for
    requesting account/card owner data.
  contact:
    email: info@berlin-group.org
    name: The Berlin Group - A European Standards Initiative
    url: 'https://www.berlin-group.org/'
schemes:
  - https
basePath: /psd2
produces:
  - application/json
consumes:
  - application/json
security:
  - AccessCodeOAuthSecDef:
      - sample_scope_1
    clientIdHeader: []
securityDefinitions:
  AccessCodeOAuthSecDef:
    type: oauth2
    flow: accessCode
    x-ibm-oauth-provider: accesscodeoauthprovider
    authorizationUrl: 'https://$(catalog.url)/accesscodeoauthprovider/oauth2/authorize'
    tokenUrl: 'https://$(catalog.url)/accesscodeoauthprovider/oauth2/token'
    scopes:
      sample_scope_1: Sample scope description 1
  clientIdHeader:
    type: apiKey
    name: X-IBM-Client-Id
    in: header
    x-key-type: client_id
x-ibm-configuration:
  gateway: datapower-api-gateway
  type: rest
  phase: realized
  enforced: true
  testable: true
  cors:
    enabled: true
  assembly:
    execute:
      - switch:
          version: 2.0.0
          title: switch
          case:
            - condition: ($operationID() = 'readListOfCards')
              execute:
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: $(app-server)/ServicesWS_v1.7.0/AccountWS.svc/ReadCardList
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
            - condition: ($operationID() = 'readCardDetails')
              execute:
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: >-
                      $(app-server)/ServicesWS_v1.7.0/AccountWS.svc/ReadCardDetails/$(request.parameters.card-id)
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
            - condition: ($operationID() = 'readCardBalances')
              execute:
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: >-
                      $(app-server)/ServicesWS_v1.7.0/AccountWS.svc/ReadCardBalance/$(request.parameters.card-id)?$(request.querystring)
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
            - condition: ($operationID() = 'getCardTransactionList')
              execute:
                - invoke:
                    version: 2.0.0
                    title: invoke
                    header-control:
                      type: blacklist
                      values: []
                    parameter-control:
                      type: whitelist
                      values: []
                    timeout: 15
                    verb: POST
                    cache-response: protocol
                    cache-ttl: 900
                    stop-on-error: []
                    tls-profile: 'gateway-to-application-tls-client:1.0.0'
                    target-url: >-
                      $(app-server)/ServicesWS_v1.7.0/AccountWS.svc/ReadCardTransactionList/$(request.parameters.card-id)?$(request.querystring)
                - parse:
                    version: 2.0.0
                    title: parse
                    parse-settings-reference:
                      default: apic-default-parsesettings
                    use-content-type: true
                - validate:
                    version: 2.0.0
                    title: validate
                    input: message
                    validate-against: response-param
    catch:
      - errors:
          - ValidateError
        execute:
          - gatewayscript:
              version: 2.0.0
              title: gatewayscript
              source: "const apim = require('apim')\r\nvar msg = \"Format of certain request fields is not matching the XS2A requirements.\"\r\nif(apim.getError().name == \"ValidateError\"){\r\n    var errorMsg = apim.getError().message\r\n    //Error message is in a format of:\r\n    //Validate: temporary:///swagger/.....json:....: [JSV0001] Invalid value type 'string\r\n    //We'll cut the prefix \r\n    //Validate: temporary:///....: [JSV0001]\r\n    var index = errorMsg.indexOf(']')\r\n    errorMsg = errorMsg.substring(index + 1, errorMsg.length)\r\n    msg = msg.concat(errorMsg)\r\n}\r\nvar tppMessages = { tppMessages: [{\r\n    'category': 'ERROR',\r\n    'code': 'FORMAT_ERROR',\r\n    'text': msg\r\n}]\r\n}\r\napim.setvariable('message.body',  JSON.stringify(tppMessages));\r\n"
  properties:
    target-url:
      value: 'http://example.com/operation-name'
      description: The URL of the target service
      encoded: false
    app-server:
      value: 'https://skydev4-hz.matrix.it:8443'
  application-authentication:
    certificate: false
  activity-log:
    enabled: true
    error-content: header
    success-content: activity
  catalogs: {}
tags:
  - name: cards
definitions:
  readCardListResponse-200_json:
    title: readCardListResponse-200_json
    description: Descriptions of the accessible cards.
    type: object
    properties:
      cards:
        type: array
        items:
          $ref: '#/definitions/cardAccountDetails'
    required:
      - cards
  readCardDetailsResponse-200_json:
    title: readCardDetailsResponse-200_json
    description: Details of the card.
    type: object
    properties:
      card:
        $ref: '#/definitions/cardAccountDetails'
    required:
      - card
  readCardBalancesResponse-200_json:
    title: readCardBalancesResponse-200_json
    description: Balances of the cards.
    type: object
    properties:
      card:
        $ref: '#/definitions/accountReference'
      balances:
        description: >-
          The specific card account balances associated to this card / card
          account. In the context of a response to a "cards" endpoint, 

          each balance that indicates that credit limit is included must respect
          all applicable credit limits relevant for this 

          card ( cp. Section 6.6)
        type: array
        items:
          $ref: '#/definitions/balance'
    required:
      - card
      - balances
  readCardTransactionsResponse-200_json:
    title: readCardTransactionsResponse-200_json
    description: Transactions of the cards.
    type: object
    properties:
      card:
        $ref: '#/definitions/accountReference'
      balances:
        description: >-
          The specific card account balances associated to this card / card
          account. In the context of a response to a "cards" endpoint, 

          each balance that indicates that credit limit is included must respect
          all applicable credit limits relevant for this 

          card ( cp. Section 6.6)
        type: array
        items:
          $ref: '#/definitions/balance'
      cardTransactions:
        $ref: '#/definitions/cardAccountReport'
      _links:
        $ref: '#/definitions/_linksPagination'
    required:
      - card
      - cardTransactions
  cardAccountReport:
    title: cardAccountReport
    description: >-
      JSON based card account report.


      This card account report contains transactions resulting from the query
      parameters.
    type: object
    properties:
      booked:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/cardTransaction'
      pending:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/cardTransaction'
      _links:
        $ref: '#/definitions/_linksCardAccountReport'
    required:
      - _links
  _linksCardAccountReport:
    title: _linksCardAccountReport
    type: object
    properties:
      cardAccount:
        $ref: '#/definitions/hrefType'
      card:
        $ref: '#/definitions/hrefType'
      first:
        $ref: '#/definitions/hrefType'
      next:
        $ref: '#/definitions/hrefType'
      previous:
        $ref: '#/definitions/hrefType'
      last:
        $ref: '#/definitions/hrefType'
  cardTransaction:
    title: cardTransaction
    description: Card transaction information.
    type: object
    properties:
      cardTransactionId:
        description: Unique end to end identity.
        type: string
        maxLength: 35
      terminalId:
        description: 'Identification of the Terminal, where the card has been used.'
        type: string
        maxLength: 35
      transactionDate:
        description: Date of the actual card transaction.
        type: string
        format: date
      acceptorTransactionDateTime:
        description: Timestamp of the actual card transaction within the acceptance system
        type: string
        format: date-time
      bookingDate:
        description: The date when an entry is posted to an account on the ASPSPs books.
        type: string
        format: date
      valueDate:
        description: >-
          The Date at which assets become available to the account owner in case
          of a credit, or cease to be available to the account owner in case of
          a debit entry. For card transactions this is the payment due date of
          related booked transactions of a card.
        type: string
        format: date
      transactionAmount:
        $ref: '#/definitions/amount'
      grandTotalAmount:
        $ref: '#/definitions/amount'
      currencyExchange:
        description: Array of exchange rates.
        type: array
        items:
          $ref: '#/definitions/reportExchangeRate'
      originalAmount:
        $ref: '#/definitions/amount'
      markupFee:
        $ref: '#/definitions/amount'
      markupFeePercentage:
        example: '0.3'
        type: string
      cardAcceptorId:
        type: string
        maxLength: 35
      cardAcceptorName:
        type: string
        maxLength: 70
      cardAcceptorAddress:
        $ref: '#/definitions/address'
      cardAcceptorPhone:
        description: >-
          Merchant phone number

          It consists of a "+" followed by the country code (from 1 to 3
          characters) then a "-" and finally, any

          combination of numbers, "(", ")", "+" and "-" (up to 30 characters).

          pattern according to ISO20022 \+[0-9]{1,3}-[0-9()+\-]{1,30}
        type: string
        pattern: '^\+[0-9]{1,3}\-[0-9()+\-]{1,30}$'
      merchantCategoryCode:
        description: Merchant category code.
        type: string
        minLength: 4
        maxLength: 4
      maskedPAN:
        description: >-
          Primary Account Number (PAN) of the card in masked form. In the
          context of a response to a "/card-accounts" endpoint, this is the 

          PAN of the main card; in the context of a "/cards" endpoint, this
          identifies the specific card for that the information is presented.

          This data element can be used in the body of the Consent Request
          Message for retrieving account access consent from this card.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      transactionDetails:
        type: string
        maxLength: 1000
      invoiced:
        type: boolean
      proprietaryBankTransactionCode:
        description: >-
          Proprietary bank transaction code as used within a community or within
          an ASPSP e.g. 

          for MT94x based transaction reports.
        type: string
        maxLength: 35
    required:
      - transactionAmount
  reportExchangeRate:
    title: reportExchangeRate
    description: Exchange Rate.
    type: object
    properties:
      sourceCurrency:
        description: |-
          ISO 4217 Alpha 3 currency code.
          BOI-REMARK: Card/Account currency.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      exchangeRate:
        type: string
      unitCurrency:
        description: |-
          ISO 4217 Alpha 3 currency code.
          BOI-REMARK: Card/Account currency.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      targetCurrency:
        description: |-
          ISO 4217 Alpha 3 currency code.
          BOI-REMARK: Card/Account currency.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      quotationDate:
        type: string
        format: date
      contractIdentification:
        type: string
        maxLength: 35
    required:
      - sourceCurrency
      - exchangeRate
      - unitCurrency
      - targetCurrency
      - quotationDate
  address:
    title: address
    example:
      streetName: rue blue
      buildingnNumber: '89'
      townName: Paris
      postCode: '75000'
      country: FR
    type: object
    properties:
      streetName:
        type: string
        maxLength: 70
      buildingNumber:
        type: string
      townName:
        type: string
      postCode:
        type: string
      country:
        description: ISO 3166 ALPHA2 country code.
        example: SE
        type: string
        pattern: '^[A-Z]{2}$'
    required:
      - country
  cardAccountDetails:
    title: cardAccountDetails
    description: Card account details.
    type: object
    properties:
      resourceId:
        description: >-
          This is the data element to be used in the path when retrieving data
          from a dedicated account.

          This shall be filled, if addressable resource are created by the ASPSP
          on the /card-accounts endpoint.
        type: string
      maskedPan:
        description: >-
          Primary Account Number (PAN) of the card in masked form. In the
          context of a response to a "/card-accounts" endpoint, this is the 

          PAN of the main card; in the context of a "/cards" endpoint, this
          identifies the specific card for that the information is presented.

          This data element can be used in the body of the Consent Request
          Message for retrieving account access consent from this card.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      currency:
        description: |-
          ISO 4217 Alpha 3 currency code.
          BOI-REMARK: Card/Account currency.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      ownerName:
        description: >-
          Name of the legal account owner. 

          If there is more than one owner, then e.g. two names might be noted
          here.


          For a corporate account, the corporate name is used for this
          attribute.

          Even if supported by the ASPSP, the provision of this field might
          depend on the fact whether an explicit consent to this specific 

          additional account information has been given by the PSU.
        example: John Doe
        type: string
        maxLength: 140
      name:
        description: >-
          Name of the card / card account, as assigned by the ASPSP, 

          in agreement with the account owner in order to provide an additional
          means of identification of the account.
        type: string
        maxLength: 70
      displayName:
        description: >-
          Name of the card / card account as defined by the PSU within online
          channels.
        type: string
        maxLength: 70
      product:
        description: >-
          Product Name of the Bank for this card / card account, proprietary
          definition.
        type: string
        maxLength: 35
      status:
        $ref: '#/definitions/accountStatus'
      usage:
        $ref: '#/definitions/Usage'
      details:
        description: |-
          Specifications that might be provided by the ASPSP:
            - characteristics of the account
            - characteristics of the relevant card
            BOI REMARK:
            For example
            - charactaristic of the creditLimit level.
            - charactaristic of the monthly billing date.
        type: string
        maxLength: 1000
      creditLimit:
        $ref: '#/definitions/amount'
      balances:
        description: >-
          The specific card account balances associated to this card / card
          account. In the context of a response to a "cards" endpoint, 

          each balance that indicates that credit limit is included must respect
          all applicable credit limits relevant for this 

          card ( cp. Section 6.6)
        type: array
        items:
          $ref: '#/definitions/balance'
      _links:
        $ref: '#/definitions/_linksAccountDetails'
    required:
      - maskedPan
      - currency
      - usage
  accountStatus:
    title: accountStatus
    description: >-
      Account status. The value is one of the following:
        - "enabled": card / card account is available
        - "deleted": card / card account is terminated
        - "blocked": card / card account is blocked e.g. for legal reasons
      If this field is not used, than the card / card account is available in
      the sense of this specification.

      BOI-REMARK: "blocked" e.g. for legal reasons or suspended.
    type: string
    enum:
      - enabled
      - deleted
      - blocked
  amount:
    title: amount
    example:
      currency: EUR
      amount: '123'
    type: object
    properties:
      currency:
        description: |-
          ISO 4217 Alpha 3 currency code.
          BOI-REMARK: Card/Account currency.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      amount:
        description: >-
          The amount given with fractional digits, where fractions must be
          compliant to the currency definition.

          Up to 14 significant figures. Negative amounts are signed by minus.

          The decimal separator is a dot.


          **Example:**

          Valid representations for EUR with up to two decimals are:

            * 1056
            * 5768.2
            * -1.50
            * 5877.78
        example: '5877.78'
        type: string
        pattern: '^-?[0-9]{1,14}(\.[0-9]{1,3})?$'
    required:
      - currency
      - amount
  balance:
    title: balance
    description: A single balance element.
    type: object
    properties:
      balanceAmount:
        $ref: '#/definitions/amount'
      balanceType:
        $ref: '#/definitions/balanceType'
      creditLimitIncluded:
        description: |-
          A flag indicating if the credit limit of the corresponding account 
          is included in the calculation of the balance, where applicable.
        example: false
        type: boolean
      lastChangeDateTime:
        description: >-
          This data element might be used to indicate e.g. with the expected or
          booked balance that no action is known 

          on the account, which is not yet booked.
        type: string
        format: date-time
      referenceDate:
        description: Reference date of the balance.
        type: string
        format: date
      lastCommittedTransaction:
        description: >-
          "entryReference" of the last commited transaction to support the TPP
          in identifying whether all 

          PSU transactions are already known.
        type: string
        maxLength: 35
    required:
      - balanceAmount
      - balanceType
      - creditLimitIncluded
      - referenceDate
  accountAccess:
    title: accountAccess
    description: Requested access services for a consent.
    type: object
    properties:
      accounts:
        description: >-
          Is asking for detailed account information. 


          If the array is empty in a request, the TPP is asking for an
          accessible account list. 

          This may be restricted in a PSU/ASPSP authorization dialogue. 

          If the array is empty, also the arrays for balances,
          additionalInformation sub attributes or transactions shall be empty,
          if used.
        type: array
        items:
          $ref: '#/definitions/accountReference'
      balances:
        description: >-
          Is asking for balances of the addressed accounts.


          If the array is empty in the request, the TPP is asking for the
          balances of all accessible account lists. 

          This may be restricted in a PSU/ASPSP authorization dialogue. 

          If the array is empty, also the arrays for accounts,
          additionalInformation sub attributes or transactions shall be empty,
          if used.
        type: array
        items:
          $ref: '#/definitions/accountReference'
      transactions:
        description: >-
          Is asking for transactions of the addressed accounts. 


          If the array is empty in the request, the TPP is asking for the
          transactions of all accessible account lists.

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for accounts,
          additionalInformation sub attributes or balances shall be empty, if
          used.
        type: array
        items:
          $ref: '#/definitions/accountReference'
      additionalInformation:
        $ref: '#/definitions/additionalInformationAccess'
      availableAccounts:
        $ref: '#/definitions/AvailableAccounts'
      availableAccountsWithBalance:
        $ref: '#/definitions/AvailableAccountsWithBalance'
      allPsd2:
        $ref: '#/definitions/AllPsd2'
      restrictedTo:
        description: >-
          If the TPP requests access to accounts via availableAccounts (List of
          available accounts), global 

          or bank driven consents, the TPP may include this element to restrict
          access to the referred 

          account types. Absence of the element is interpreted as "no
          restriction" (therefore access to 

          accounts of all types is requested). The element may only occur, if
          each of the elements 
            - accounts 
            - balances 
            - transactions 
          is either not present or contains an empty array. 
            BOI-REMARK:
            This attribute have to be supported by the API Provider. 
            
            In detailed consent model this field have to be empty or not presented.
        type: array
        items:
          $ref: '#/definitions/cashAccountType'
  additionalInformationAccess:
    title: additionalInformationAccess
    description: >-
      Optional if supported by API provider.


      Is asking for additional information as added within this structured
      object.

      The usage of this data element requires at least one of the entries
      "accounts", 

      "transactions" or "balances" also to be contained in the object. 

      If detailed accounts are referenced, it is required in addition that any
      account addressed within 

      the additionalInformation attribute is also addressed by at least one of
      the attributes "accounts", 

      "transactions" or "balances".
    type: object
    properties:
      ownerName:
        description: >-
          Is asking for account owner name of the accounts referenced within. 

          If the array is empty in the request, the TPP is asking for the
          account 

          owner name of all accessible accounts. 

          This may be restricted in a PSU/ASPSP authorization dialogue. 

          If the array is empty, also the arrays for accounts, balances or
          transactions shall be empty, if used.

          The ASPSP will indicate in the consent resource after a successful
          authorisation, 

          whether the ownerName consent can be accepted by providing the
          accounts on which the ownerName will 

          be delivered. 

          This array can be empty.
        type: array
        items:
          $ref: '#/definitions/accountReference'
      trustedBeneficiaries:
        description: >-
          Optional if supported by API provider.

          Is asking for the trusted beneficiaries related to the accounts
          referenced within and related to the PSU.

          If the array is empty in the request, the TPP is asking for the lists
          of trusted beneficiaries of all accessible accounts. 

          This may be restricted in a PSU/ASPSP authorization dialogue by the
          PSU if also the account lists addressed 

          by the tags �accounts�, �balances� or �transactions� are empty.

          The ASPSP will indicate in the consent resource after a successful
          authorisation, 

          whether the trustedBeneficiaries consent can be accepted by providing
          the accounts on which the list of trusted beneficiaries will be
          delivered. 

          This array can be empty.
        type: array
        items:
          $ref: '#/definitions/accountReference'
  balanceType:
    title: balanceType
    description: |-
      The following balance types are defined:
        - "closingBooked": 
          Balance of the account at the end of the pre-agreed account reporting period. 
          It is the sum of the opening booked balance at the beginning of the period and all entries booked 
          to the account during the pre-agreed account reporting period.
          
          For card-accounts and cards, this is composed of
          
            - invoiced, but not yet paid entries
              For cards the account entries are booking entries from the card processor or invoices paid by the PSU. 
              
          BOI-REMARK for future: 
          For cards , this is composed of entries at the closing time of the accounting period, which have to be invoiced. i.e. invoiced and paid entries at the closing time of the accounting period.
        - "expected":
          Balance composed of booked entries and pending items known at the time of calculation, 
          which projects the end of day balance if everything is booked on the account and no other entry is posted.
          
          For card accounts, this is composed of:
            - invoiced, but not yet paid entries
            - not yet invoiced but already booked entries and
            - pending items (not yet booked)
          
          For card-accounts:
          
          "money to spend with the value of a pre-approved credit limit on the card account"
          
        - "openingBooked":
          Book balance of the account at the beginning of the account reporting period. 
          It always equals the closing book balance from the previous report.
        - "interimAvailable":
          Available balance calculated in the course of the account ?servicer?s business day, 
          at the time specified, and subject to further changes during the business day. 
          The interim balance is calculated on the basis of booked credit and debit items during the calculation 
          time/period specified.
          
          For card-accounts, this is composed of:
            - invoiced, but not yet paid entries
            - not yet invoiced but already booked entries
            
          For cards, this is composed of 
            - invoiced, but not yet paid entries 
            - not yet invoiced but already booked entries 
            - pending items (not yet booked)
        - "interimBooked":
          Balance calculated in the course of the account servicer's business day, at the time specified, 
          and subject to further changes during the business day. 
          The interim balance is calculated on the basis of booked credit and debit items during the calculation time/period 
          specified.
          
          BOI REMARK for future:
          For cards, this time period consists of the accounting period of the related card, e.g. thie interim booked items during a month. i.e. invoiced, but not yet paid entries.
        - "forwardAvailable":
          Forward available balance of money that is at the disposal of the account owner on the date specified.
        - "nonInvoiced": 
          Only for card accounts, to be checked yet.
    type: string
    enum:
      - closingBooked
      - expected
      - openingBooked
      - interimAvailable
      - interimBooked
      - forwardAvailable
      - nonInvoiced
  _linksAccountDetails:
    title: _linksAccountDetails
    description: >-
      Links to the card / card account, which can be directly used for
      retrieving account information from this dedicated account.


      Links to "balances" and/or "cardTransactions"


      These links are only supported, when the corresponding consent has been
      already granted.
    type: object
    properties:
      balances:
        $ref: '#/definitions/hrefType'
      transactions:
        $ref: '#/definitions/hrefType'
      card:
        $ref: '#/definitions/hrefType'
      cardTransactions:
        $ref: '#/definitions/hrefType'
  hrefType:
    title: hrefType
    description: Link to a resource.
    type: object
    properties:
      href:
        description: Link to a resource.
        example: /v1/payments/sepa-credit-transfers/1234-wertiq-983
        type: string
  accountReference:
    title: accountReference
    description: |-
      Reference to an account by either
        * IBAN, of a payment accounts, or
        * BBAN, for payment accounts if there is no IBAN, or 
        * the Primary Account Number (PAN) of a card, can be tokenised by the ASPSP due to PCI DSS requirements, or
        * the Primary Account Number (PAN) of a card in a masked form, or
        * an alias to access a payment account via a registered mobile phone number (MSISDN)
    type: object
    properties:
      iban:
        description: IBAN of an account.
        example: FR7612345987650123456789014
        type: string
        pattern: '^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}$'
      bban:
        description: |-
          Basic Bank Account Number (BBAN) Identifier.

          This data element can be used in the body of the consent request.
            Message for retrieving account access consent from this account. This
            data elements is used for payment accounts which have no IBAN.
            ISO20022: Basic Bank Account Number (BBAN). 
            
            Identifier used nationally by financial institutions, i.e., in individual countries, 
            generally as part of a National Account Numbering Scheme(s), 
            which uniquely identifies the account of a customer.
        type: string
      maskedPan:
        description: >-
          Primary Account Number (PAN) of the card in masked form. In the
          context of a response to a "/card-accounts" endpoint, this is the 

          PAN of the main card; in the context of a "/cards" endpoint, this
          identifies the specific card for that the information is presented.

          This data element can be used in the body of the Consent Request
          Message for retrieving account access consent from this card.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      msisdn:
        description: Mobile phone number.
        example: +49 170 1234567
        type: string
        maxLength: 35
      currency:
        description: |-
          ISO 4217 Alpha 3 currency code.
          BOI-REMARK: Card/Account currency.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      cashAccountType:
        $ref: '#/definitions/cashAccountType'
    required:
      - maskedPan
  otherType:
    title: otherType
    description: >-
      In cases where the specifically defined criteria (IBAN, BBAN, MSISDN) are
      not provided to identify an instance of the respective account type (e.g.
      a savings account), the ASPSP shall include a proprietary ID of the
      respective account that uniquely identifies the account for this ASPSP.
    type: object
    properties:
      identification:
        description: Proprietary identification of the account.
        type: string
        maxLength: 35
      schemeNameCode:
        description: An entry provided by an external ISO code list.
        type: string
      schemeNameProprietary:
        description: A scheme name defined in a proprietary way.
        type: string
        maxLength: 35
      issuer:
        description: Issuer of the identification.
        type: string
        maxLength: 35
    required:
      - identification
  cashAccountType:
    title: cashAccountType
    description: >-
      ExternalCashAccountType1Code from ISO 20022 or Type "CARD". The API
      provider may restrict the accepted 

      values further (e.g. only "CARD" and "CACC" may be supported). The TPP
      includes this element, if the 

      account reference may identify several accounts of different types, but
      the TPP only requests access to 

      a specific type (e.g. card accounts).


      BOI Remark:Savings: SVGS for saving accounts Loan: "LOAN" for loan
      accounts If the cashAccountType is

      not present, it indicates the cashAccountType
        - "Card Account" in case of the account identification being provided as a maskedPan 
        - "Current Account" (CACC) otherwise.
      In case the TPP requests access for several types with same identifiers,
      the TPP will send the same 

      identifier multiple times for each cashAccountType.
    type: string
    enum:
      - CACC
      - CARD
