  ExternalCashAccountType3:
    title: ExternalCashAccountType3
    description: >-
      ExternalCashAccountType1Code from ISO 20022. Might be extended by an
      additional code to indicate securities accounts. 

      A global definition of a code for securities accounts is intentionally not
      provided by this document.

      The API provider may restrict the accepted values further (e.g. only
      \"SVGS\" and \"CACC\" may be supported). 

      The TPP includes this element, if the account reference may identify
      several accounts of different types, 

      but the TPP only requests access to a specific type (e.g. card accounts).

      If the cashAccountType is not present, it indicates the cashAccountType

      * \"Card Account\" in case of the account identification being provided as
      a maskedPan or a pan and 

      * \"Current Account\" (CACC) otherwise.

      BOI REMARKS:

      Code for securities : "SCTS"

      In case the TPP requests access for several types with same identifiers,
      the TPP will send the same identifier multiple times for each
      cashAccountType.
    type: string
    enum:
      - CACC
      - CARD
      - LOAN
      - SVGS
      - SCTS
