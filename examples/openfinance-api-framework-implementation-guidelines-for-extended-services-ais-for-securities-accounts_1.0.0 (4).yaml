  '/v1.0.0/securities-accounts/{securities-account-id}/transactions':
    get:
      description: >-
        Reads the list of transactions associated with a securities account as
        permitted by the presented consent
      summary: getSecuritiesTransactions
      tags:
        - Securities AIS
      operationId: getSecuritiesTransactions
      deprecated: false
      produces:
        - application/json
        - application/problem+json
      parameters:
        - name: securities-account-id
          in: path
          required: true
          description: >-
            This identification is denoting the addressed securities account. 

            The securities-account-id is retrieved by using a \"Read Securities
            Account List\". 

            The securities-account-id is the \"resourceId\" attribute of the
            securities account structure. 

            Its value is constant at least throughout the lifecycle of a given
            consent.
          type: string
        - name: dateFrom
          in: query
          required: true
          description: >-
            Conditional: Starting date (inclusive the date dateFrom) of the
            transaction list, mandated if no delta access is required

            and if bookingStatus does not equal \"information\".

            For booked transactions, the relevant date is the booking date. 

            For pending transactions, the relevant date is the entry date, which
            may not be transparent 

            neither in this API nor other channels of the ASPSP.

            BOI remarks: 

            The ASPSP shall provide a documentation with the maximum value.

            In case of exception from the minimum value the response will be
            only for the minimum period.
          type: string
        - name: dateTo
          in: query
          required: false
          description: >-
            End date (inclusive the data dateTo) of the transaction list,
            default is \"now\" if not given. 

            Might be ignored if a delta function is used.

            For booked transactions, the relevant date is the booking date. 

            For pending transactions, the relevant date is the entry date, which
            may not be transparent 

            neither in this API nor other channels of the ASPSP.
          type: string
        - name: entryReferenceFrom
          in: query
          required: false
          description: >-
            This data attribute is indicating that the AISP is in favour to get
            all transactions after 

            the transaction with identification entryReferenceFrom alternatively
            to the above defined period. 

            This is a implementation of a delta access. 

            If this data element is contained, the entries \"dateFrom\" and
            \"dateTo\" might be ignored by the ASPSP 

            if a delta report is supported.

            Optional if supported by API provider.
          type: string
        - name: deltaList
          in: query
          required: false
          description: >-
            This data attribute is indicating that the AISP is in favour to get
            all transactions after the last report access for this PSU on the
            addressed account. This is another implementation of a delta
            access-report. This delta indicator might be rejected by the ASPSP
            if this function is not supported. Optional if supported by API
            provider
          type: boolean
        - name: X-Request-ID
          in: header
          required: true
          description: >-
