  TypeOfPrice17Code:
    title: TypeOfPrice17Code
    description: |-
      TypeOfPrice17Code from ISO 20022.
      Compare 
      ISO 20022
      Settlement And Reconciliation - ISO - Maintenace 2019 - 2020
      Message Definition Report - Part 2
      Approved by the Securities SEG on the 27th of January 2020:
      <table border="1">
        <tr>
          <th>CodeName</th>
          <th>Name</th>
          <th>Definition</th>
        </tr>
        <tr>
          <td>BIDE</td>
          <td>Bid</td>
          <td>
            Price is the calculated bid price of a dual-priced fund (offer-bid prices), that is, 
            the selling price of the units for the investor.
          </td>
        </tr>
        <tr>
          <td>OFFR</td>
          <td>Offer</td>
          <td>
            Price is the calculated offer price of a dual-priced investment fund (offer-bid prices), 
            that is, the buying price of the units for an investor.
          </td>
        </tr>
        <tr>
          <td>NAVL</td>
          <td>NetAssetValue</td>
          <td>
            Price is the net asset value per unit that is used either as a transacting price for a single-priced 
            investment fund class, or as a notional price for the calculation of other prices.
          </td>
        </tr>
        <tr>
          <td>CREA</td>
          <td>Creation</td>
          <td>
            Price is the calculated creation price of a dual-priced investment fund (creation-cancellation 
            prices) and the highest possible buying price of the units before the initial charge. 
            The actual buying or offer price, which includes charges, will be higher.
          </td>
        </tr>
        <tr>
          <td>CANC</td>
          <td>Cancellation</td>
          <td>
            Price is the calculated cancellation price of a dual-priced investment fund (creation-cancellation 
            price), and the lowest possible valuation of the units on any one-day. 
            The actual selling or bid price is usually higher.
          </td>
        </tr>
        <tr>
          <td>INTE</td>
          <td>Interim</td>
          <td>Price is the non-official interim price given to an investor before the executed price.</td>
         </tr>
        <tr>
          <td>SWNG</td>
          <td>Swing</td>
          <td>
             Price is the calculated net asset value price of a single-priced investment fund.
             The price is adjusted to take into accountthe dealing costs due to individual large
             deals, or due to a significant imbalance in volumes of subscriptions vs redemptions, 
             as an alternative to dilutionlevy.
           </td>
        </tr>
        <tr>
          <td>MIDD</td>
          <td>Mid</td>
          <td>Price is the average price between the bid and offer prices.</td>
        </tr>
        <tr>
          <td>RINV</td>
          <td>Reinvestment</td>
          <td>Price is the price used when reinvesting units after distribution.</td>
        </tr>
        <tr>
          <td>SWIC</td>
          <td>Switch</td>
          <td>Price is the price used when transferring units between products.</td>
        </tr>
        <tr>
          <td>MRKT</td>
          <td>Market</td>
          <td>Price is the current market price.</td>
        </tr>
        <tr>
          <td>INDC</td>
          <td>Indicative</td>
          <td>Price is the estimated indicative price.</td>
        </tr>
        <tr>
          <td>DDVR</td>
          <td>DailyDividendRate</td>
          <td>
            Price is the net income of a financial instrument, calculated on each dealing
            day, and divided by all the units outstanding on that day.
          </td>
        </tr>
        <tr>
          <td>ACTU</td>
          <td>Actual</td>
          <td>True offer price.</td>
        </tr>
      </table>
    type: string
    enum:
      - BIDE
      - OFFR
      - NAVL
      - CREA
      - CANC
      - INTE
      - SWNG
      - MIDD
      - RINV
      - SWIC
      - MRKT
      - INDC
      - DDVR
      - ACTU
