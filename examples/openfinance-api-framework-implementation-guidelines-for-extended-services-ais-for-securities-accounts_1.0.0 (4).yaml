  ExternalCashAccountType1:
    title: ExternalCashAccountType1
    description: >-
      ExternalCashAccountType1Code from ISO 20022. Might be extended by an
      additional code to indicate 

      securities accounts. A global definition of a code for securities accounts
      is intentionally not 

      provided by this document.

      BOI remarks:

      Code for securities: "SCTS"
    type: string
