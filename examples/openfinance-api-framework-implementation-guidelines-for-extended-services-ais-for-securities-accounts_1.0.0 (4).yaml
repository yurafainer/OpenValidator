          type: string
        - name: PSU-Accept-Language
          in: header
          required: false
          description: >-
            The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
          type: string
        - name: PSU-User-Agent
          in: header
          required: false
          description: >-
