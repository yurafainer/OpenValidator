definitions:
  error_RFC7807_429_AIS:
    title: error_RFC7807_429_AIS
    description: >-
      Standardised definition of reporting error information according to
      [RFC7807].
    type: object
    properties:
      type:
        description: >-
          A URI reference [RFC3986] that identifies the problem type. 

          Remark For Future: These URI will be provided by NextGenPSD2 in
          future.
        type: string
        maxLength: 70
      title:
        type: string
        maxLength: 70
      detail:
        description: '$ref: ''#/components/schemas/Max500Text'''
      code:
        description: Message codes for HTTP Error code 429 (TOO MANY REQUESTS).
        type: string
        default: ACCESS_EXCEEDED
      additionalErrors:
        description: |-
          Array of Error Information Blocks.
          Might be used if more than one error is to be communicated
        type: array
        items:
          $ref: '#/definitions/AdditionalError'
      _links:
        $ref: '#/definitions/_linksAll'
    required:
      - type
      - code
  TradingSessionTypeCode:
    title: TradingSessionTypeCode
    description: >-
      Code set to identify the type of a trading session, in which an order
      shall be executed. Possible values:

      * **auctions**: Orders that are traded in regularly occurring auctions:
      orders are 
        accumulated and executed on the basis of defined algorithms.
      * **continuous**: Orders that are executed directly against each other as
      they hit the marketplace.
    type: string
    enum:
      - auctions
      - continuous
  MessageCode_405_AIS:
    title: MessageCode_405_AIS
    description: >-
      Message codes defined for AIS for HTTP Error code 405 (METHOD NOT
      ALLOWED).
    type: string
    enum:
      - SERVICE_INVALID
  SecuritiesOrderSide:
    title: SecuritiesOrderSide
    description: >-
      Code set to identify the \"side\" / intended action for the respective
      order.
    type: string
    enum:
      - buy
      - sell
      - subscription
      - redemption
  error_NG_400_AIS:
    title: error_NG_400_AIS
    type: object
    properties:
      tppMessages:
        type: array
        items:
          $ref: '#/definitions/tppMessage_400_AIS'
      _links:
        $ref: '#/definitions/_linksAll'
  tppMessage_403_AIS:
