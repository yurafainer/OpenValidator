        - application/problem+json
      parameters:
        - name: securities-account-id
          in: path
          required: true
          description: >-
            This identification is denoting the addressed securities account. 

            The securities-account-id is retrieved by using a \"Read Securities
            Account List\". 

            The securities-account-id is the \"resourceId\" attribute of the
            securities account structure. 

            Its value is constant at least throughout the lifecycle of a given
            consent.
          type: string
        - name: orderId
          in: path
          required: true
          description: >-
            This identification is given by the attribute orderId of the
            corresponding entry of an order list.
          type: string
        - name: X-Request-ID
          in: header
          required: true
          description: >-
            ID of the request, unique to the call, as determined by the
            initiating party.
          type: string
