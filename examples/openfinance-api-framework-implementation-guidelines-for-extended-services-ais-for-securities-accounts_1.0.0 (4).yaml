  OrderStatusCode:
    title: OrderStatusCode
    description: |-
      Code set to identify the status of an order. 
      <table border="1">
        <tr>
          <th>CodeName</th>
          <th>Definition</th>
        </tr>
        <tr>
          <td>unknown</td>
          <td>the status of this order can currently not be determined</td>
        </tr>
        <tr>
          <td>new</td>
          <td>Outstanding order with no executions</td>
        </tr>
        <tr>
          <td>partiallyFilled</td>
          <td>Outstanding order with executions and remaining quantity</td>
        </tr>
        <tr>
          <td>filled</td>
          <td>Order completely filled, no remaining quantity</td>
        </tr>
        <tr>
          <td>doneForDay</td>
          <td>Order not, or partially, filled; no further executions forthcoming for the trading day</td>
        </tr>
        <tr>
          <td>canceled</td>
          <td>Cancelled order with or without executions</td>
        </tr>
        <tr>
          <td>replaced</td>
          <td>Cancelled order due to a replacement with or without executions</td>
        </tr>
        <tr>
          <td>pendingCancel</td>
          <td>Order with a request for cancellation pending. Does not indicate that the order has been cancelled.</td>
        </tr>
        <tr>
          <td>stopped</td>
          <td>Order has been stopped at the exchange. Used when guaranteeing or protecting a price and quantity</td>
        </tr>
        <tr>
          <td>rejected</td>
          <td>Order has been rejected by sell-side (broker, exchange, ECN). NOTE: An order can be rejected subsequent to order acknowledgment, i.e. an order can pass from New to Rejected status.</td>
        </tr>
        <tr>
          <td>suspended</td>
          <td>Order has been placed in suspended state at the request of the client.</td>
        </tr>
        <tr>
          <td>pendingNew</td>
          <td>Order has been received by sell-side's (broker, exchange, ECN) system but not yet accepted for execution.</td>
        </tr>
        <tr>
          <td>calculated</td>
          <td>Order has been completed for the day (either filled or done for day). Commission or currency settlement details have been calculated</td>
        </tr>
        <tr>
          <td>expired</td>
          <td>Order has been cancelled in broker's system due to time in force instructions.</td>
        </tr>
        <tr>
          <td>acceptedForBidding</td>
          <td>Order has been received and is being evaluated for pricing.</td>
        </tr>
        <tr>
          <td>pendingReplace</td>
          <td>Order with an Order Cancel/Replace Request pending.</td>
        </tr>
      </table>
    type: string
    enum:
      - unknown
      - new
      - partiallyFilled
      - filled
      - doneForDay
      - canceled
      - replaced
      - pendingCancel
      - stopped
      - rejected
      - suspended
      - pendingNew
      - calculated
      - expired
      - acceptedForBidding
      - pendingReplace
