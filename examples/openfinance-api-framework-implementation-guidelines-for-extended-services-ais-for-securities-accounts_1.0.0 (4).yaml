  TypeOfOrderCode:
    title: TypeOfOrderCode
    description: |-
      Code set to indicate characteristics of an order.
      <table border="1">
        <tr>
          <th>CodeName</th>
          <th>Definition</th>
        </tr>
        <tr>
          <td>allOrNone</td>
          <td>A round-lot market or limit-price order which must be executed in its entirety or not at all; unlike 'fill or kill', these orders are not cancelled if not executed as soon as received.</td>
        </tr>
        <tr>
          <td>buyContraShortExempt</td>
          <td>Order to buy contra short exempt.</td>
        </tr>
        <tr>
          <td>buyContraShort</td>
          <td>Order to buy contra short.</td>
        </tr>
        <tr>
          <td>buyMinus</td>
          <td>Order to buy at a price lower than the current market price. This is an order to buy a stated amount of a financial instrument provided that its price is not higher than the last sale if the last sale was a minus or zero minus tick, not higher than the last sale minus the minimum fractional change in the stock if the last sale was a plus or zero plus tick. The price limit indicates the highest price at which the order can be executed.</td>
        </tr>
        <tr>
          <td>carefully</td>
          <td>Order that is not to be executed as a whole because it may disturb the price.</td>
        </tr>
        <tr>
          <td>combinationOrder</td>
          <td>Order that is linked to another order to buy or sell and must be executed as a unit, both or none, or cancelled as a unit.</td>
        </tr>
        <tr>
          <td>discretionary</td>
          <td>Order where the executing broker or investment manager decides on the quantity or price.</td>
        </tr>
        <tr>
          <td>doNotIncrease</td>
          <td>Limit order to buy or stop order to sell or stop limit order that is not to be increased in shares on the ex-dividend date as a result of a stock dividend or distribution.</td>
        </tr>
        <tr>
          <td>doNotReduce</td>
          <td>Limit order to buy or stop order to sell, or stop-limit order to sell that is not to be reduced in price by the amount of an ordinary cash dividend. Applies only to ordinary stock dividends; should be reduced for other distributions.</td>
        </tr>
        <tr>
          <td>icebergOrder</td>
          <td>Type of limit order whose overall quantity is not transparent to the market. Rather, only a client-defined part of the order is shown to the market (the 'tip of the iceberg'). Upon execution of the first 'tip' (that is partial execution to the client while for the market it does not appear to be a 'partial') the system releases the next 'tip' of the same size to the market until the 'iceberg' has been melted down successfully. Different from a usual care order.</td>
        </tr>
        <tr>
          <td>limitWith</td>
          <td>Order to be executed at a limit price, with a round-lot (or board-lot) sales; valid only for odd lot orders.</td>
        </tr>
        <tr>
          <td>limitWithout</td>
          <td>Order to be executed at a limit price, without a round-lot (or board-lot) sales; valid only for odd lot orders.</td>
        </tr>
        <tr>
          <td>limitOrder</td>
          <td>Order to buy at the indicated price limit or lower or an order to sell at the indicated limit price or higher.</td>
        </tr>
        <tr>
          <td>atMarket</td>
          <td>Order to buy or sell a specified amount of a financial instrument at the quoted market price or better.</td>
        </tr>
        <tr>
          <td>marketNotHeld</td>
          <td>Order to buy or sell a specified amount of a financial instrument at the quoted market price or better with some discretion on the price limit.</td>
        </tr>
        <tr>
          <td>marketToLimitOrder</td>
          <td>Type of order that couples the high possibility of execution (Market Order) with a protection against unwanted price fluctuations (Limit Order).</td>
        </tr>
        <tr>
          <td>marketUntilTouched</td>
          <td>Order to buy or sell a specified amount of a financial instrument at the quoted market price or better with some discretion on the price limit.</td>
        </tr>
        <tr>
          <td>notHeld</td>
          <td>Order that may be executed in partials or outside the hours of the exchange or other exchange rules.</td>
        </tr>
        <tr>
          <td>orderLie</td>
          <td>Order that is related to another order where the second order may be cancelled without cancelling the first. Normally, the sell order must be executed before the buy order.</td>
        </tr>
        <tr>
          <td>stopLimit</td>
          <td>Stop order to buy (sell) that becomes a limit order at the limit price when the financial instrument trades at or above (below) the stop price after the order is submitted.</td>
        </tr>
        <tr>
          <td>stopOrder</td>
          <td>Order to buy that becomes a market order when the financial instrument trades at or above the stop price after the order is submitted or an order to sell which becomes a market order when the financial instrument trades at or below the stop price.</td>
        </tr>
        <tr>
          <td>stopLoss</td>
          <td>Order to sell that sets the sell price below the market price.</td>
        </tr>
        <tr>
          <td>sellPlus</td>
          <td>Order to sell a stated amount provided that the price is not lower than the last sale price if the last sale was a plus or zero plus tick and not lower than the last sale minus the minimum fractional change in the financial instrument if the last sale was a minus or zero minus tick.</td>
        </tr>
        <tr>
          <td>sellShortExempt</td>
          <td>Order to sell short which is exempt from short-sale rules.</td>
        </tr>
        <tr>
          <td>sellShort</td>
          <td>Order to sell a financial instrument that the seller does not own; a sale effected by delivering a financial instrument borrowed by or for the account of the seller.</td>
        </tr>
      </table>
    type: string
    enum:
      - allOrNone
      - buyContraShortExempt
      - buyContraShort
      - buyMinus
      - carefully
      - combinationOrder
      - discretionary
      - doNotIncrease
      - doNotReduce
      - icebergOrder
      - limitWith
      - limitWithout
      - limitOrder
      - atMarket
      - marketNotHeld
      - marketToLimitOrder
      - marketUntilTouched
      - notHeld
      - orderLie
      - stopLimit
      - stopOrder
      - stopLoss
      - sellPlus
      - sellShortExempt
      - sellShort
