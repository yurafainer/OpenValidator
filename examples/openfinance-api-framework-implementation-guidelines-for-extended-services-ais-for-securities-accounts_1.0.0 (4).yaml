        $ref: '#/definitions/SecuritiesBalanceType_1_2_11_12_Code2'
      averageBuyingPrice:
        $ref: '#/definitions/amount'
      averageSellingPrice:
        $ref: '#/definitions/amount'
      totalBuyingPrice:
        $ref: '#/definitions/amount'
      estimatedCurrentValue:
        $ref: '#/definitions/EstimatedCurrentValue'
      accruedInterest:
        $ref: '#/definitions/accruedInterest'
      currencyExchange:
        type: array
        items:
          $ref: '#/definitions/reportExchangeRate'
      details:
        type: string
        maxLength: 500
    required:
      - financialInstrument
  TppMessageCategory:
    title: TppMessageCategory
    description: Category of the TPP message category.
    type: string
    enum:
      - ERROR
      - WARNING
  error_NG_409_AIS:
    title: error_NG_409_AIS
    type: object
    properties:
      tppMessages:
        type: array
        items:
