  tppMessage_429_AIS:
    title: tppMessage_429_AIS
    type: object
    properties:
      category:
        $ref: '#/definitions/TppMessageCategory'
      code:
        description: Message codes for HTTP Error code 429 (TOO MANY REQUESTS).
        type: string
        default: ACCESS_EXCEEDED
      path:
        type: string
      text:
        type: string
        maxLength: 500
    required:
