swagger: '2.0'
info:
  title: >-
    openFinance API Framework Implementation Guidelines for Extended Services
    AIS for Securities Accounts
  x-ibm-name: >-
    openfinance-api-framework-implementation-guidelines-for-extended-services-ais-for-securities-accounts
  version: 1.0.0
  description: >
    With the XS2A Specification [XS2A-IG], a standard for an XS2A Interface is
    defined for the core services defined by the PSD2.

    With [oFA-IG-SecAIS] an extension of the NextGenPSD2 XS2A Specification
    [XS2A-IG]. It describes how the existing services for 

    account information can be extended to provide account information on
    securities accounts. Therefore, new endpoints are 

    defined in order to provide the information.This yaml file reflects the API
    definition given in [oFA-IG-SecAIS] and therefore 

    provides the (essentially) same information regarding the data definition in
    a machine readable form.
      **[XS2A-IG]** NextGenPSD2 XS2A Framework, Implementation Guidelines, The Berlin Group Joint Initiative on a PSD2 Compliant XS2A Interface, version 1.3.12, published 01 July 2022.
      **[oFA-IG-SecAIS]** openFinance API Framework Implementation Guidelines for Extended Services AIS for Securities Accounts
  contact:
    email: info@berlin-group.org
    name: The Berlin Group - A European Standards Initiative
    url: 'https://www.berlin-group.org/'
schemes:
  - https
basePath: /psd2
produces:
  - application/json
consumes:
  - application/json
security:
  - AccessCodeOAuthSecDef:
      - sample_scope_1
    clientIdHeader: []
securityDefinitions:
  clientIdHeader:
    type: apiKey
    name: X-IBM-Client-Id
    in: header
    x-key-type: client_id
  AccessCodeOAuthSecDef:
    type: oauth2
    flow: accessCode
    x-ibm-oauth-provider: accesscodeoauthprovider
    authorizationUrl: 'https://$(catalog.url)/accesscodeoauthprovider/oauth2/authorize'
    tokenUrl: 'https://$(catalog.url)/accesscodeoauthprovider/oauth2/token'
    scopes:
      sample_scope_1: Sample scope description 1
