  '/v1.5.0/loans/{loan-account-id}':
    get:
      description: >
        Reads details about a loan account. 

        It is assumed that a consent of the PSU to 

        this access is already given and stored on the ASPSP system. 

        The addressed details of this account depend then on the stored consent
        addressed by consentId, 

        respectively the OAuth2 access token.
                
      summary: readLoanAccountDetails
      tags:
        - Account Information Service (AIS)
        - loans
        - account details
      operationId: readLoanAccountDetails
      deprecated: false
      produces:
        - application/json
        - application/problem+json
      parameters:
        - name: loan-account-id
          in: path
          required: true
          type: string
          description: >-
            This identification is denoting the addressed loan account. 

            The loan-account-id is retrieved by using a "readLoanAccountList".

            The loan-account-id is the "resourceId" attribute of the loan
            account structure.

            Its value is constant at least throughout the lifecycle of a given
            consent.
        - name: X-Request-ID
          in: header
          required: true
          type: string
          format: uuid
          description: >-
            ID of the request, unique to the call, as determined by the
            initiating party.
        - name: Digest
          in: header
          required: true
