tags:
  - name: Extended Account Information Service (AIS)
  - name: Account Information Service (AIS)
definitions:
  accountDetailsSavingsLoans:
    title: accountDetailsSavingsLoans
    description: Details of a savings or loans account
    type: object
    properties:
      resourceId:
        description: >-
          This shall be filled, if addressable resource are created by the ASPSP
          on the /savings or /loans endpoint.
        type: string
      iban:
        description: IBAN of an account.
        example: FR7612345987650123456789014
        type: string
        pattern: '^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}$'
      bban:
        description: |-
          Basic Bank Account Number (BBAN) Identifier.

          This data element can be used in the body of the consent request.
            Message for retrieving account access consent from this account. This
            data elements is used for payment accounts which have no IBAN.
            ISO20022: Basic Bank Account Number (BBAN). 
            
            Identifier used nationally by financial institutions, i.e., in individual countries, 
            generally as part of a National Account Numbering Scheme(s), 
            which uniquely identifies the account of a customer.
        type: string
      msisdn:
        description: Mobile phone number.
        example: +49 170 1234567
        type: string
        maxLength: 35
      other:
        $ref: '#/definitions/otherType'
      currency:
        description: ISO 4217 Alpha 3 currency code.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      ownerName:
        description: >-
          Name of the legal account owner. If there is more than one owner, then
          e.g. two names might be noted here. For a corporate account, the
          corporate name is used for this attribute. Even if supported by the
          ASPSP, the provision of this field might depend on the fact whether
          anexplicit consent to this specific additional account information has
          been given by the PSU. BOI Remarks - Name of the legal Saving \ Loan
          account owner. For the Israeli market there is no need in explicit
          consent to this specific additional account information.
        type: string
        maxLength: 140
      name:
        description: >-
          Name of the saving \loan \  account, as assigned by the ASPSP, in
          agreement with the account owner in order to provide an additional
          means of identification of the account.
        type: string
        maxLength: 70
      displayName:
        description: >-
          Name of the saving \loan \  account as defined by the PSU within
          online channels.
        type: string
        maxLength: 70
      product:
        description: 'Product name of the bank for this account, proprietary definition.'
        type: string
        maxLength: 35
      cashAccountType:
        $ref: '#/definitions/cashAccountType'
      status:
        $ref: '#/definitions/Status'
      bic:
        description: BICFI
        example: AAAADEBBXXX
        type: string
        pattern: '^[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}$'
      interest:
        description: >-
          A set of interest rates associated to this account, e.g. interests for
          savings or credits.Optionally used for savings accounts and loan
          accounts.
        type: array
        items:
          $ref: '#/definitions/interest'
      relatedDates:
        $ref: '#/definitions/relatedDates'
      collateralsInvolved:
        description: >-
          'Only used for loan accounts: Is set to true if a collateral is
          involved securing the loan.

          (e.g. security deposit, physical collaterals like houses, cars). More
          information might be provided under the "details" attribute.'
        type: boolean
      guarateeInvolved:
        description: >-
          'Only used for loan accounts: Is set to true in  case  of  specific
          collaterals  where  a guarantee of payment of the loan is given by a
          different person.'
        type: boolean
      linkedAccounts:
        description: >-
          Case of a set of pending card transactions, the APSP will provide the
          relevant cash account associated to pending loan, savings or card
          transactions.
        type: string
        maxLength: 70
      usage:
        $ref: '#/definitions/Usage'
      details:
        description: |-
          Specifications that might be provided by the ASPSP:
            - characteristics of the account
            - characteristics of the relevant card
            - characteristics of the savings account, and the ASPSP will provide specification for each deposit
            - characteristics of the loan
        type: string
        maxLength: 500
      balances:
        description: >-
          A list of balances regarding this account, e.g. the current balance,
          the last booked balance.

          The list might be restricted to the current balance.
        type: array
        items:
          $ref: '#/definitions/balance'
      _links:
        $ref: '#/definitions/_linksAccountDetails'
    required:
      - currency
      - cashAccountType
      - usage
  consentAccountReference:
    title: consentAccountReference
    description: |-
      Reference to an account by either
        * IBAN, of a payment accounts, or
        * PAN of a card in a masked form, or
        * an alias to access a payment account via a registered mobile phone number (MSISDN).
        
        BOI-REMARK: The currency of the account is needed, where the currency is an account charactaristic identifying certain sub-accounts under one external identifier like an IBAN. Once the currency wasn't defined, a specific IBAN includes all the currencies relates to this IBAN.
    type: object
    properties:
      iban:
        description: IBAN of an account.
        example: FR7612345987650123456789014
        type: string
        pattern: '^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}$'
      bban:
        description: |-
          Basic Bank Account Number (BBAN) Identifier.

          This data element can be used in the body of the consent request.
            Message for retrieving account access consent from this account. This
            data elements is used for payment accounts which have no IBAN.
            ISO20022: Basic Bank Account Number (BBAN). 
            
            Identifier used nationally by financial institutions, i.e., in individual countries, 
            generally as part of a National Account Numbering Scheme(s), 
            which uniquely identifies the account of a customer.
        type: string
      maskedPan:
        description: Masked Primary Account Number.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      msisdn:
        description: Mobile phone number.
        example: +49 170 1234567
        type: string
        maxLength: 35
      other:
        $ref: '#/definitions/otherType'
      currency:
        $ref: '#/definitions/consentCurrencyCode'
      cashAccountType:
        $ref: '#/definitions/cashAccountType'
  accountAccess:
    title: accountAccess
    description: Requested access services for a consent.
    type: object
    properties:
      accounts:
        description: >-
          Is asking for detailed account information. 


          If the array is empty, the TPP is asking for an accessible account
          list. 

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for balances or transactions
          shall be empty, if used
        type: array
        items:
          $ref: '#/definitions/consentAccountReference'
      balances:
        description: >-
          Is asking for balances of the addressed accounts.


          If the array is empty, the TPP is asking for the balances of all
          accessible account lists. 

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for accounts or transactions
          shall be empty, if used.
        type: array
        items:
          $ref: '#/definitions/consentAccountReference'
      transactions:
        description: >-
          Is asking for transactions of the addressed accounts. 


          If the array is empty, the TPP is asking for the transactions of all
          accessible account lists. 

          This may be restricted in a PSU/ASPSP authorization dialogue.

          If the array is empty, also the arrays for accounts or balances shall
          be empty, if used.
        type: array
        items:
          $ref: '#/definitions/consentAccountReference'
      availableAccounts:
        $ref: '#/definitions/AvailableAccounts'
      availableAccountsWithBalance:
        $ref: '#/definitions/AvailableAccountsWithBalance'
      allPsd2:
        $ref: '#/definitions/AllPsd2'
      restrictedTo:
        description: >-
          Conditional if supported by API provider.


          If the TPP requests access to account via available accounts (list of
          available accounts), global or bank driven consents, the TPP may
          include this element to restrict access to the referred account types.

          Absence of the element is interpreted as "no restriction" (therefore
          access to accounts of all types is requested). The element may only
          occur, if each of the elements
              * accounts
              * balances
              * transactions
            
            is either not present or contains an empty array.
            Remark for future: In a future version of the XS2A-Interface the data model for consents will be changed and therefore this element will most likely become obsolete.
            BOI-REMARK:
            This attribute have to be supported by the API Provider. 
            
            In detailed consent model this field have to be empty or not presented.
        type: array
        items:
          $ref: '#/definitions/cashAccountType'
  accountReference:
    title: accountReference
    description: |-
      Reference to an account by either
        * IBAN, of a payment accounts, or
        * BBAN, for payment accounts if there is no IBAN, or 
        * the Primary Account Number (PAN) of a card, can be tokenised by the ASPSP due to PCI DSS requirements, or
        * the Primary Account Number (PAN) of a card in a masked form, or
        * an alias to access a payment account via a registered mobile phone number (MSISDN), or
        * a proprietary ID of the  respective account that uniquely identifies the account for this ASPSP.
    type: object
    properties:
      iban:
        description: IBAN of an account.
        example: FR7612345987650123456789014
        type: string
        pattern: '^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}$'
      bban:
        description: |-
          Basic Bank Account Number (BBAN) Identifier.

          This data element can be used in the body of the consent request.
            Message for retrieving account access consent from this account. This
            data elements is used for payment accounts which have no IBAN.
            ISO20022: Basic Bank Account Number (BBAN). 
            
            Identifier used nationally by financial institutions, i.e., in individual countries, 
            generally as part of a National Account Numbering Scheme(s), 
            which uniquely identifies the account of a customer.
        type: string
      maskedPan:
        description: Masked Primary Account Number.
        example: 123456xxxxxx1234
        type: string
        maxLength: 35
      msisdn:
        description: Mobile phone number.
        example: +49 170 1234567
        type: string
        maxLength: 35
      other:
        $ref: '#/definitions/otherType'
      currency:
        description: ISO 4217 Alpha 3 currency code.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      cashAccountType:
        $ref: '#/definitions/cashAccountType'
  accountReport:
    title: accountReport
    description: >-
      JSON based account report.

      This account report contains transactions resulting from the query
      parameters.


      'booked' shall be contained if bookingStatus parameter is set to "booked"
      or "both".


      'pending' is not contained if the bookingStatus parameter is set to
      "booked" or "information".


      'information' Only contained if the bookingStatus is set to "information"
      and if supported by ASPSP.
    type: object
    properties:
      booked:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/transactions'
      pending:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/transactions'
      information:
        description: Array of transaction details.
        type: array
        items:
          $ref: '#/definitions/transactions'
      _links:
        $ref: '#/definitions/_linksAccountReport'
    required:
      - _links
  amount:
    title: amount
    example:
      currency: EUR
      amount: '123'
    type: object
    properties:
      currency:
        description: ISO 4217 Alpha 3 currency code.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      amount:
        description: >-
          The amount given with fractional digits, where fractions must be
          compliant to the currency definition.

          Up to 14 significant figures. Negative amounts are signed by minus.

          The decimal separator is a dot.


          **Example:**

          Valid representations for EUR with up to two decimals are:

            * 1056
            * 5768.2
            * -1.50
            * 5877.78
        example: '5877.78'
        type: string
        pattern: '^-?[0-9]{1,14}(\.[0-9]{1,3})?$'
    required:
      - currency
      - amount
  amountDependentRate:
    title: amountDependentRate
    description: Used in case of FC index
    type: object
    properties:
      percentage:
        description: >-
          The (signed) rate of the interest. Remark: ISO 20022 is defining
          Percentage as a decimal type, where 5.0 expresses 5% interest rate.
          This specification is using a signed percentage to be able to express
          also negative percentage codes, i.e. -1.2 will express -1,2% of
          interest.
        example: '-0.3'
        type: string
      fromAmount:
        $ref: '#/definitions/amount'
      toAmount:
        $ref: '#/definitions/amount'
    required:
      - percentage
  balance:
    title: balance
    description: A single balance element.
    type: object
    properties:
      balanceAmount:
        $ref: '#/definitions/amount'
      balanceType:
        $ref: '#/definitions/balanceType'
      creditLimitIncluded:
        description: |-
          A flag indicating if the credit limit of the corresponding account 
          is included in the calculation of the balance, where applicable.
        example: false
        type: boolean
      lastChangeDateTime:
        description: >-
          This data element might be used to indicate e.g. with the expected or
          booked balance that no action is known 

          on the account, which is not yet booked.
        type: string
        format: date-time
      referenceDate:
        description: Indicates the date of the balance.
        type: string
        format: date
      lastCommittedTransaction:
        description: >-
          "entryReference" of the last commited transaction to support the TPP
          in identifying whether all 

          PSU transactions are already known.
        type: string
        maxLength: 35
    required:
      - balanceAmount
      - balanceType
      - creditLimitIncluded
      - referenceDate
  balanceType:
    title: balanceType
    description: |-
      The following balance types are defined:
        - "closingBooked": 
          Balance of the account at the end of the pre-agreed account reporting period. 
          It is the sum of the opening booked balance at the beginning of the period and all entries booked 
          to the account during the pre-agreed account reporting period.
          
          For card-accounts, this is composed of
          
            - invoiced, but not yet paid entries
          
        - "expected":
          Balance composed of booked entries and pending items known at the time of calculation, 
          which projects the end of day balance if everything is booked on the account and no other entry is posted.
          
          For card accounts, this is composed of:
            - invoiced, but not yet paid entries
            - not yet invoiced but already booked entries and
            - pending items (not yet booked)
          
          ###For card-accounts:
          ###
          ###"money to spend with the value of a pre-approved credit limit on the card account"
          ###
          For savings and loans:
          
          estimated balance (e.g. including an upcoming interest payment) for the referenced date.
          
          BOI -remarks: openingBooked is not supported for the Israeli market.
        - "openingBooked":
          Book balance of the account at the beginning of the account reporting period. 
          It always equals the closing book balance from the previous report.
        - "interimAvailable":
          Available balance calculated in the course of the account ?servicer?s business day, 
          at the time specified, and subject to further changes during the business day. 
          The interim balance is calculated on the basis of booked credit and debit items during the calculation 
          time/period specified.
          
          For card-accounts, this is composed of:
            - invoiced, but not yet paid entries
            - not yet invoiced but already booked entries
          NOT used for savings and loans.
          
        - "interimBooked":
          Balance calculated in the course of the account servicer's business day, at the time specified, 
          and subject to further changes during the business day. 
          The interim balance is calculated on the basis of booked credit and debit items during the calculation time/period 
          specified.
          
        - "forwardAvailable":
          Forward available balance of money that is at the disposal of the account owner on the date specified.
          NOT used for savings and loans.
          
        - "nonInvoiced": 
          Only for card accounts, to be defined yet.
    type: string
    enum:
      - closingBooked
      - expected
      - openingBooked
      - interimAvailable
      - interimBooked
      - forwardAvailable
      - nonInvoiced
  cashAccountType:
    title: cashAccountType
    description: >-
      ExternalCashAccountType1Code from ISO 20022.

      The API provider may restrict the accepted values further .

      The TPP includes this element, if the account reference may identify
      several accounts of different types, but the TPP only requests access to a
      specific type (e.g. card accounts).

      BOI-REMARK - In case the TPP requests access for several types with same
      identifiers, the TPP will send the same identifier multiple times for each
      cashAccountType..
    type: string
    enum:
