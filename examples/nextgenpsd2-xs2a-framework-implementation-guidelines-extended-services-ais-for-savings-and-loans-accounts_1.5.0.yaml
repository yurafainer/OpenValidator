  Status:
    title: Status
    description: >-
      Account status. The value is one of the following:
        - "enabled": account is available
        - "deleted": account is terminated
        - "blocked": account is blocked e.g. for legal reasons
      If this field is not used, than the account is available in the sense of
      this specification.
    type: string
    enum:
      - enabled
      - deleted
      - blocked
  Type:
    title: Type
    description: FIXD and INDE are the only permitted codes for now.
    type: string
    enum:
      - FIXD
      - INDE
  Usage:
    title: Usage
    description: |-
      Specifies the usage of the account:
        * PRIV: private personal account
        * ORGA: professional account
    type: string
    enum:
      - PRIV
      - ORGA
paths:
  /v1.5.0/loans:
    get:
      description: >
        Reads a list of loan accounts potentially with additional information,
        e.g. balance information.

        It is assumed that a consent of the PSU to this access is already given
        and stored on the ASPSP system. 

        The addressed list of savings accounts depends then on the stored
        consent addressed by consentId,

        respectively the OAuth2 accesstoken.
      summary: readLoanAccountList
      tags:
        - Extended Account Information Service (AIS)
        - loans
        - account list
      operationId: readLoanAccountList
      deprecated: false
      produces:
        - application/json
        - application/problem+json
      parameters:
        - name: X-Request-ID
          in: header
          required: true
          type: string
          format: uuid
          description: >-
            ID of the request, unique to the call, as determined by the
            initiating party.
        - name: Digest
          in: header
          required: true
          type: string
          description: >-
            Is contained if and only if the "Signature" element is contained in
            the header of the request.
        - name: Signature
          in: header
          required: true
          type: string
          description: >-
            A signature of the request by the TPP on application level. This
            might be mandated by ASPSP.
        - name: TPP-Signature-Certificate
          in: header
          required: true
          type: string
          description: |-
            The certificate used for signing the request, in base64 encoding. 
            Must be contained if a signature is contained.
        - name: Consent-ID
          in: header
          required: true
          type: string
          description: >-
            This then contains the consentId of the related AIS consent, which
            was performed prior to this payment initiation.
        - name: PSU-IP-Address
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Address header field consists of the corresponding
            HTTP request 

            IP Address field between PSU and TPP. 

            It shall be contained if and only if this request was actively
            initiated by the PSU.
        - name: PSU-IP-Port
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Port header field consists of the corresponding
            HTTP request IP Port field between PSU and TPP, if available.
        - name: PSU-Accept
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
        - name: PSU-Accept-Charset
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
        - name: PSU-Accept-Encoding
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
        - name: PSU-Accept-Language
          in: header
          required: false
          type: string
          description: >-
            The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
        - name: PSU-User-Agent
          in: header
          required: false
          type: string
          description: >-
            The forwarded Agent header field of the HTTP request between PSU and
            TPP, if available.
        - name: PSU-Http-Method
          in: header
          required: false
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          type: string
          description: |-
            HTTP method used at the PSU ? TPP interface, if available.
            Valid values are:
            * GET
            * POST
            * PUT
            * PATCH
            * DELETE
        - name: PSU-Device-ID
          in: header
          required: false
          type: string
          format: uuid
          description: >-
            UUID (Universally Unique Identifier) for a device, which is used by
            the PSU, if available.

            UUID identifies either a device or a device dependant application
            installation.

            In case of an installation identification this ID needs to be
            unaltered until removal from device.
        - name: PSU-Geo-Location
          in: header
          required: false
          type: string
          pattern: '^GEO:-?[0-9]{1,2}\.[0-9]{6};-?[0-9]{1,3}\.[0-9]{6}$'
          description: >-
            The forwarded Geo Location of the corresponding http request between
            PSU and TPP if available.
