swagger: '2.0'
info:
  title: >-
    NextGenPSD2 XS2A Framework Implementation Guidelines Extended Services AIS
    for Savings and Loans Accounts
  x-ibm-name: >-
    nextgenpsd2-xs2a-framework-implementation-guidelines-extended-services-ais-for-savings-and-loans-accounts
  version: 1.5.0
  description: >
    # Summary

    Like a (regular payment) account, specific savings accounts can be addressed
    in a consent request by identifying the account by its IBAN.

    In some cases, a savings / loan accountmight not be connected to any
    globally defined identifier. Therefore, the additional element "other" 

    is used, which might be provided instead of or in addition to an IBAN
    thereby identifying the specific  account, for  which a consent is
    requested.


    Additionally, a savings account can be addressed by an Account Access Object
    containing an identifier  of  the  savings account / loan account
    accompanied by

    the specification of the cashAccountType to Type "SVGS"/ "LOAN". A consent
    of this type will grant the access to the related savingsaccount/ loan
    account, if the

    ASPSP supports the corresponding endpoints at all.


    As a third / fourth way to establish a savings specific consent, the TPP can
    request a bank-offered consent or a global consent but restricting the 
    requested 

    access to a certain cashAccountType �e.g. "SVGS" or "LOAN". A consent of
    this type grant the access to accounts of only the related type (e.g.
    savings account/

    loan account),if the ASPSP supports the corresponding endpoints at all.
  contact:
    email: info@berlin-group.org
    name: The Berlin Group - A European Standards Initiative
    url: 'https://www.berlin-group.org/'
schemes:
  - https
basePath: /psd2
produces:
  - application/json
consumes:
  - application/json
security:
  - AccessCodeOAuthSecDef:
      - sample_scope_1
    clientIdHeader: []
securityDefinitions:
  AccessCodeOAuthSecDef:
    type: oauth2
    flow: accessCode
    x-ibm-oauth-provider: accesscodeoauthprovider
    authorizationUrl: 'https://$(catalog.url)/accesscodeoauthprovider/oauth2/authorize'
    tokenUrl: 'https://$(catalog.url)/accesscodeoauthprovider/oauth2/token'
    scopes:
      sample_scope_1: Sample scope description 1
  clientIdHeader:
    type: apiKey
    name: X-IBM-Client-Id
    in: header
    x-key-type: client_id
