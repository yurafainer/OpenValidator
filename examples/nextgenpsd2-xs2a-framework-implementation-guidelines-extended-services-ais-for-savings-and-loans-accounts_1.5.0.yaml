    title: interest
    type: object
    properties:
      type:
        $ref: '#/definitions/Type'
      relatedIndices:
        description: List of Indices where the interest rate is related to.
        type: array
        items:
          $ref: '#/definitions/index'
      rate:
        description: >-
          An array of interest rates, which might apply to different amount
          ranges.
        type: array
        items:
          $ref: '#/definitions/amountDependentRate'
      fromDateTime:
        description: >-
          The date from which this interest rate is applicable. If no exact time
          is applicable, 00:00:00 is chosen as time definition.
        type: string
        format: date-time
      toDateTime:
        description: >-
          The date until this interest rate is applicable. If no exact time is
          applicable, 23:59:59 is chosen as time definition.
        type: string
        format: date-time
      changeMechanism:
        description: An explanation of a mandated change mechanism.
        type: string
        maxLength: 1024
    required:
      - rate
