  '/v1.5.0/loans/{loan-account-id}/transactions':
    get:
      description: >
        'Reads transaction data from a given loan account addressed by
        "loan-account-id". 

        This can be booked or pending transactions. 


        Note: The ASPSP might use standard compression methods on application
        level for the response message 

        as indicated in the content encoding header. 


        Remark: Please note that the PATH might be already given in detail by
        the response of the 

        "Read Loan Account List" call within the _links subfield.'
      summary: readLoanAccountTransactionList
      tags:
        - Account Information Service (AIS)
        - loans
        - transactions
      operationId: readLoanAccountTransactionList
      deprecated: false
      produces:
        - application/json
        - application/problem+json
      parameters:
        - name: loan-account-id
          in: path
          required: true
          type: string
          description: >-
            This identification is denoting the addressed loan account. 

            The loan-account-id is retrieved by using a "readLoanAccountList".

            The loan-account-id is the "resourceId" attribute of the loan
            account structure.

            Its value is constant at least throughout the lifecycle of a given
            consent.
        - name: dateFrom
          in: query
          required: true
          type: string
          format: date
          description: >-
            Conditional: Starting date (inclusive the date dateFrom) of the
            transaction list, mandated if no delta access is required

            and if bookingStatus does not equal "information".


            For booked transactions, the relevant date is the booking date. 


            For pending transactions, the relevant date is the entry date, which
            may not be transparent 

            neither in this API nor other channels of the ASPSP.
        - name: dateTo
          in: query
          required: false
          type: string
          format: date
          description: >-
            End date (inclusive the data dateTo) of the transaction list,
            default is "now" if not given. 


            Might be ignored if a delta function is used.


            For booked transactions, the relevant date is the booking date. 


            For pending transactions, the relevant date is the entry date, which
            may not be transparent 

            neither in this API nor other channels of the ASPSP.
        - name: entryReferenceFrom
          in: query
          required: false
          type: string
          description: >-
            This data attribute is indicating that the AISP is in favour to get
            all transactions after 

            the transaction with identification entryReferenceFrom alternatively
            to the above defined period. 

            This is a implementation of a delta access. 

            If this data element is contained, the entries "dateFrom" and
            "dateTo" might be ignored by the ASPSP 

            if a delta report is supported.


            Optional if supported by API provider.
        - name: bookingStatus
          in: query
          required: true
          enum:
            - information
            - booked
            - pending
            - both
            - all
          type: string
          description: >-
            Permitted codes are 
              * "booked",
              * "pending",  
              * "both",
              * "information" and
              * "all"
            "booked" shall be supported by the ASPSP.

            To support the "pending" and "both" feature is optional for the
            ASPSP, 

            Error code if not supported in the online banking frontend.

            If supported, "both" means to request transaction reports of
            transaction of bookingStatus either "pending" or "booked".

            To support the "information" feature is optional for the ASPSP.
            Currently the booking status “information” only covers standing
            orders. Error code if not supported.

            To support the "all" feature is optional for the ASPSP, Error code
            if not supported. If supported, "all" means to request transaction
            reports of transaction of any bookingStatus ("pending", "booked" or
            "information").
        - name: deltaList
          in: query
          required: false
          type: boolean
          description: >-
            This data attribute is indicating that the AISP is in favour to get
            all transactions after the last report access for this PSU on the
            addressed account. This is another implementation of a delta
            access-report.

            This delta indicator might be rejected by the ASPSP if this function
            is not supported.

            Optional if supported by API provider
        - name: X-Request-ID
          in: header
          required: true
          type: string
          format: uuid
          description: >-
            ID of the request, unique to the call, as determined by the
            initiating party.
