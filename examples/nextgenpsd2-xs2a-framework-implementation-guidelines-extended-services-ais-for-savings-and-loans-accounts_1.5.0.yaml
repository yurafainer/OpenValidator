  relatedDates:
    title: relatedDates
    description: 'Dates related to this account, e.g. start Date.'
    type: object
    properties:
      contractStartDate:
        description: Start of the account contract.
        type: string
        format: date
      contractEndDate:
        description: End of the account contract.
        type: string
        format: date
      contractAvailabilityDate:
        description: >-
          Next Date where money can be taken off a savings account without loss
          of interest, if initiated now (in case of a savings account). Next
          Date where a loan can be fully repaid without any extra fee.
        type: string
        format: date
  reportExchangeRate:
    title: reportExchangeRate
    description: Exchange Rate.
    type: object
    properties:
      sourceCurrency:
        description: ISO 4217 Alpha 3 currency code.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      exchangeRate:
        type: string
      unitCurrency:
        type: string
      targetCurrency:
        description: ISO 4217 Alpha 3 currency code.
        example: EUR
        type: string
        pattern: '^[A-Z]{3}$'
      quotationDate:
        type: string
        format: date
      contractIdentification:
        type: string
    required:
      - sourceCurrency
      - exchangeRate
      - unitCurrency
      - targetCurrency
      - quotationDate
  standingOrderDetails:
    title: standingOrderDetails
    description: Details of underlying standing orders.
    type: object
    properties:
      startDate:
        type: string
        format: date
      frequency:
        $ref: '#/definitions/frequencyCode'
      endDate:
        type: string
        format: date
      executionRule:
        $ref: '#/definitions/executionRule'
      withinAMonthFlag:
        description: >-
          This element is only used in case of frequency equals "Monthly".


          If this element equals false it has no effect.

          If this element equals true, then the execution rule is overruled if
          the day of execution would fall into a different month using the
          execution rule.


          Example: executionRule equals "preceding", dayOfExecution equals "02"
          and the second of a month is a Sunday. 

          In this case, the transaction date would be on the last day of the
          month before.
           This would be overruled if withinAMonthFlag equals true and the payment is processed on Monday the third of the Month.
          Remark: This attribute is rarely supported in the market.
        type: boolean
    required:
      - startDate
      - frequency
