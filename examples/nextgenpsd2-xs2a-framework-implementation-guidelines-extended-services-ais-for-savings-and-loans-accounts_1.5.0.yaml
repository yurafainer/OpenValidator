  executionRule:
    title: executionRule
    description: >-
      "following" or "preceding" supported as values. 

      This data attribute defines the behaviour when recurring payment dates
      falls on a weekend or bank holiday. 

      The payment is then executed either the "preceding" or "following" working
      day.

      ASPSP might reject the request due to the communicated value, if rules in
      Online-Banking are not supporting 

      this execution rule.
    type: string
    enum:
      - following
      - preceding
  frequencyCode:
    title: frequencyCode
    description: >-
      The following codes from the "EventFrequency7Code" of ISO 20022 are
      supported:

      - "Daily"

      - "Weekly"

      - "EveryTwoWeeks"

      - "Monthly"

      - "EveryTwoMonths"

      - "Quarterly"

      - "SemiAnnual"

      - "Annual"

      - "MonthlyVariable"
    type: string
    enum:
      - Daily
      - Weekly
      - EveryTwoWeeks
      - Monthly
      - EveryTwoMonths
      - Quarterly
      - SemiAnnual
      - Annual
      - MonthlyVariable
  hrefType:
    title: hrefType
    description: Link to a resource.
    type: object
    properties:
      href:
        description: Link to a resource.
        example: /v1/payments/sepa-credit-transfers/1234-wertiq-983
        type: string
  index:
    title: index
    type: object
    properties:
      index:
        description: |-
          'The following codes are supported:
           - "CPI" : customer Price Index
           - "FC" : foreign currency
           - "other" : for  others, not  clearly specified index relations'
        type: string
        maxLength: 35
      rootIndexValue:
        description: >-
          A number giving the basic index value in case of CPI which is the
          basis for the loan contract.
        type: string
        maxLength: 35
      exchangeRate:
        $ref: '#/definitions/amountDependentRate'
      additionalInformation:
        description: Explanations  e.g.  on  the  "other" type.
        type: string
        maxLength: 500
